<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#050a12;
  color:white;
  font-family:Arial;
  max-width:430px;
  margin:auto;
  padding:14px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.back{
  background:#111827;
  padding:8px 14px;
  border-radius:12px;
  cursor:pointer;
}

/* CARD */
.card{
  background:linear-gradient(180deg,#0f172a,#020617);
  border-radius:24px;
  padding:16px;
  margin-bottom:14px;
}

/* CIRCLE */
.circleWrap{
  display:flex;
  justify-content:center;
  margin-bottom:10px;
}

.circle{
  width:150px;
  height:150px;
  border-radius:50%;
  border:12px solid #fb923c;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  font-weight:bold;
}

/* MACROS */
.macros{
  display:flex;
  gap:10px;
}

.macro{
  flex:1;
  padding:12px;
  border-radius:14px;
  text-align:center;
}

.pro{background:#312e81}
.carb{background:#064e3b}
.fat{background:#78350f}

/* FOOD */
.food{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid #111;
}

.food img{
  width:50px;
  height:50px;
  border-radius:10px;
  object-fit:cover;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#111827;
  color:white;
}

/* FAB */
.fab{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#7c3aed;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="location.href='index.html'">← אימונים</div>
  <div>מעקב תזונה</div>
  <div></div>
</div>

<div class="card">
  <div class="circleWrap">
    <div class="circle" id="cal">0</div>
  </div>

  <div style="text-align:center;color:#aaa;font-size:13px">
    יעד: <span id="goal"></span> קלוריות (גרעון 500)
  </div>

  <div class="macros">
    <div class="macro pro">חלבון<br><b id="pro">0</b></div>
    <div class="macro carb">פחמימות<br><b id="carb">0</b></div>
    <div class="macro fat">שומן<br><b id="fat">0</b></div>
  </div>
</div>

<div class="card">
  <input id="search" placeholder="חפש מזון (עוף, אורז, ביצה...)" />
  <div id="results"></div>
</div>

<div class="card" id="log"></div>

<div class="fab" onclick="addFood()">+</div>

<script>

const weight = 94.1;
const goalCalories = Math.round(weight*24 - 500);
goal.innerText = goalCalories;

let data = JSON.parse(localStorage.getItem("food")) || [];

const dict = {
  "אורז":"rice","עוף":"chicken","ביצה":"egg","טונה":"tuna",
  "גבינה":"cheese","לחם":"bread","בננה":"banana","חלב":"milk"
};

let selected;

async function searchFood(q){
  if(!q)return;

  let query = dict[q] || q;

  const res = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${query}&search_simple=1&action=process&json=1&page_size=10`);
  const d = await res.json();

  results.innerHTML = d.products.map(p=>`
    <div onclick='selectFood(${JSON.stringify(p)})' style="padding:10px;border-bottom:1px solid #222">
      ${p.product_name || "מוצר"}
    </div>
  `).join("");
}

function selectFood(p){
  selected = p;
}

function addFood(){
  if(!selected)return;

  const item={
    name:selected.product_name,
    cal:selected.nutriments.energy_kcal_100g||0,
    pro:selected.nutriments.proteins_100g||0,
    carb:selected.nutriments.carbohydrates_100g||0,
    fat:selected.nutriments.fat_100g||0,
    img:selected.image_front_thumb_url || ""
  };

  data.push(item);
  localStorage.setItem("food",JSON.stringify(data));

  render();
}

function render(){
  let c=0,p=0,car=0,f=0;

  log.innerHTML = data.map(x=>{
    c+=x.cal;p+=x.pro;car+=x.carb;f+=x.fat;

    return `
      <div class="food">
        <img src="${x.img}">
        <div>
          ${x.name}<br>
          <small>${Math.round(x.cal)} קלוריות</small>
        </div>
      </div>
    `;
  }).join("");

  cal.innerText = Math.round(c);
  pro.innerText = Math.round(p);
  carb.innerText = Math.round(car);
  fat.innerText = Math.round(f);
}

search.oninput = e=>searchFood(e.target.value);

render();

</script>

</body>
</html>
