<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#060b12;
  color:white;
  font-family:Arial;
  max-width:430px;
  margin:auto;
  padding:12px;
}

/* HEADER */
.header{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}

/* CARD */
.card{
  background:linear-gradient(180deg,#0f172a,#020617);
  border-radius:22px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* TOP */
.top{
  display:flex;
  gap:12px;
  align-items:center;
}

.circle{
  width:120px;
  height:120px;
  border-radius:50%;
  border:10px solid #fb923c;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:bold;
}

/* MACRO BOX */
.macros{
  display:flex;
  gap:8px;
  flex:1;
}

.macroBox{
  flex:1;
  padding:10px;
  border-radius:14px;
  text-align:center;
}

.pro{background:#312e81}
.carb{background:#064e3b}
.fat{background:#78350f}

/* FOOD ITEM */
.food{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid #111;
}

.food img{
  width:45px;
  height:45px;
  border-radius:10px;
  object-fit:cover;
}

/* BUTTON */
.addBtn{
  background:#7c3aed;
  padding:14px;
  border-radius:16px;
  text-align:center;
  margin-top:10px;
}

/* SEARCH */
input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#111827;
  color:white;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="header">מעקב תזונה</div>

<!-- TOP -->
<div class="card">
  <div class="top">
    <div class="circle" id="cal">0</div>

    <div class="macros">
      <div class="macroBox pro">
        חלבון<br><b id="pro">0</b>
      </div>

      <div class="macroBox carb">
        פחמימות<br><b id="carb">0</b>
      </div>

      <div class="macroBox fat">
        שומן<br><b id="fat">0</b>
      </div>
    </div>
  </div>

  <div style="margin-top:10px;text-align:center;font-size:13px;color:#aaa">
    יעד יומי: <span id="goal"></span> קלוריות (גרעון 500)
  </div>
</div>

<!-- SEARCH -->
<div class="card">
  <input id="search" placeholder="חפש מזון (אורז, עוף, ביצה...)" />
  <div id="results"></div>
</div>

<!-- LOG -->
<div class="card">
  <div id="log"></div>

  <div class="addBtn" onclick="addFood()">➕ הוסף מזון</div>
</div>

<script>

const weight = 94.1;
const goalCalories = Math.round(weight*24 - 500);

goal.innerText = goalCalories;

let data = JSON.parse(localStorage.getItem("food")) || [];

const translate={
  "אורז":"rice",
  "עוף":"chicken",
  "ביצה":"egg",
  "טונה":"tuna",
  "גבינה":"cheese",
  "לחם":"bread",
  "בננה":"banana"
};

let selected;

async function searchFood(q){
  if(!q)return;

  if(translate[q]) q = translate[q];

  const res = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${q}&search_simple=1&action=process&json=1&page_size=6`);
  const d = await res.json();

  results.innerHTML = d.products.map(p=>`
    <div onclick='selectFood(${JSON.stringify(p)})' style="padding:10px;border-bottom:1px solid #222">
      ${p.product_name || "מוצר"}
    </div>
  `).join("");
}

function selectFood(p){
  selected = p;
}

function addFood(){
  if(!selected)return;

  const item={
    name:selected.product_name,
    cal:selected.nutriments.energy_kcal_100g||0,
    pro:selected.nutriments.proteins_100g||0,
    carb:selected.nutriments.carbohydrates_100g||0,
    fat:selected.nutriments.fat_100g||0,
    img:selected.image_front_thumb_url || ""
  };

  data.push(item);
  localStorage.setItem("food",JSON.stringify(data));

  render();
}

function render(){
  let c=0,p=0,car=0,f=0;

  log.innerHTML = data.map(x=>{
    c+=x.cal;p+=x.pro;car+=x.carb;f+=x.fat;

    return `
      <div class="food">
        <img src="${x.img}">
        <div>
          ${x.name}<br>
          <small>${Math.round(x.cal)} קלוריות</small>
        </div>
      </div>
    `;
  }).join("");

  cal
