<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעקב תזונה</title>

<style>
body{
  margin:0;
  background:#050a14;
  font-family:-apple-system,Arial;
  color:white;
  max-width:420px;
  margin:auto;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:16px;
  font-size:20px;
  font-weight:600;
}

.back{
  background:#111827;
  padding:8px 14px;
  border-radius:14px;
  cursor:pointer;
}

/* MAIN CARD */
.card{
  margin:12px;
  padding:20px;
  border-radius:28px;
  background:linear-gradient(180deg,#0c1427,#020617);
}

/* CIRCLE */
.circle-wrap{
  display:flex;
  justify-content:center;
  position:relative;
}

svg{
  transform:rotate(-90deg);
}

.circle-text{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:30px;
  font-weight:700;
}

.goal{
  text-align:center;
  color:#9ca3af;
  margin-top:10px;
}

/* MACROS */
.macros{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.macro{
  flex:1;
  padding:16px;
  border-radius:18px;
  text-align:center;
  font-weight:600;
}

.pro{background:#4338ca;}
.carb{background:#047857;}
.fat{background:#b45309;}

/* SEARCH */
.search{
  margin:12px;
}

input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:20px;
  background:#111827;
  color:white;
  font-size:16px;
}

/* RESULTS */
.result{
  padding:14px;
  border-bottom:1px solid #111;
  cursor:pointer;
}

/* LIST */
.food{
  display:flex;
  justify-content:space-between;
  padding:14px 16px;
  border-bottom:1px solid #0f172a;
}

.food-name{
  font-weight:600;
}

.food-cal{
  color:#9ca3af;
  font-size:14px;
}

/* FAB */
.fab{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:70px;
  border-radius:50%;
  background:linear-gradient(45deg,#7c3aed,#a855f7);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:32px;
  box-shadow:0 0 20px rgba(124,58,237,0.6);
}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="location.href='index.html'">← אימונים</div>
  מעקב תזונה
  <div></div>
</div>

<div class="card">

<div class="circle-wrap">
<svg width="170" height="170">
<circle cx="85" cy="85" r="75" stroke="#1f2937" stroke-width="12" fill="none"/>
<circle id="progress" cx="85" cy="85" r="75"
stroke="#fb923c" stroke-width="12"
fill="none"
stroke-dasharray="470"
stroke-dashoffset="470"/>
</svg>

<div class="circle-text" id="cal">0</div>
</div>

<div class="goal">
יעד: <span id="goal"></span> קלוריות
</div>

<div class="macros">
<div class="macro pro">חלבון<br><span id="pro">0</span></div>
<div class="macro carb">פחמימות<br><span id="carb">0</span></div>
<div class="macro fat">שומן<br><span id="fat">0</span></div>
</div>

</div>

<div class="search">
<input id="search" placeholder="חפש מזון (עוף, אורז...)" />
<div id="results"></div>
</div>

<div id="log"></div>

<div class="fab" onclick="addFood()">+</div>

<script>

/* ===== נתונים ===== */
const weight = 94.1;
const goalCalories = Math.round(weight * 24 - 500);

const dict = {
 "עוף":"chicken",
 "חזה עוף":"chicken breast",
 "אורז":"rice",
 "ביצה":"egg",
 "טונה":"tuna",
 "גבינה":"cheese",
 "לחם":"bread",
 "בננה":"banana"
};

let data = JSON.parse(localStorage.getItem("food")) || [];
let selected = null;

/* ===== אלמנטים ===== */
const goal = document.getElementById("goal");
const cal = document.getElementById("cal");
const pro = document.getElementById("pro");
const carb = document.getElementById("carb");
const fat = document.getElementById("fat");
const log = document.getElementById("log");
const search = document.getElementById("search");
const results = document.getElementById("results");
const progress = document.getElementById("progress");

goal.innerText = goalCalories;

/* ===== חיפוש ===== */
search.oninput = async (e)=>{
 let q = e.target.value.trim();
 if(q.length < 2){
   results.innerHTML="";
   return;
 }

 let query = dict[q] || q;

 let res = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${query}&search_simple=1&action=process&json=1&page_size=5`);
 let d = await res.json();

 results.innerHTML = d.products
 .filter(p=>p.product_name)
 .map(p=>`
   <div class="result" onclick='selectFood(${JSON.stringify(p)})'>
     ${p.product_name}
     <br><small>${Math.round(p.nutriments.energy_kcal_100g||0)} קלוריות</small>
   </div>
 `).join("");
};

/* ===== בחירה ===== */
function selectFood(p){
 selected = p;
 results.innerHTML = "✔ נבחר";
}

/* ===== הוספה ===== */
function addFood(){
 if(!selected) return alert("בחר מזון");

 let item = {
  name:selected.product_name,
  cal:selected.nutriments.energy_kcal_100g||0,
  pro:selected.nutriments.proteins_100g||0,
  carb:selected.nutriments.carbohydrates_100g||0,
  fat:selected.nutriments.fat_100g||0
 };

 data.push(item);
 localStorage.setItem("food",JSON.stringify(data));
 render();
}

/* ===== רינדור ===== */
function render(){
 let c=0,p=0,car=0,f=0;

 log.innerHTML = data.map(x=>{
  c+=x.cal;p+=x.pro;car+=x.carb;f+=x.fat;

  return `
  <div class="food">
    <div>
      <div class="food-name">${x.name}</div>
      <div class="food-cal">${Math.round(x.cal)} קלוריות</div>
    </div>
  </div>`;
 }).join("");

 cal.innerText = Math.round(c);
 pro.innerText = Math.round(p);
 carb.innerText = Math.round(car);
 fat.innerText = Math.round(f);

 let percent = c/goalCalories;
 progress.style.strokeDashoffset = 470 - (470*percent);
}

render();

</script>

</body>
</html>
