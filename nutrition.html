    { id:'couscous', he:'קוסקוס מבושל', aliases:['קוסקוס'], per100:{ calories:112, protein:3.8, carbs:23.2, fat:0.2 }, units:{ gram:1, cup:150 } },
    { id:'quinoa', he:'קינואה מבושלת', aliases:['קינואה'], per100:{ calories:120, protein:4.4, carbs:21.3, fat:1.9 }, units:{ gram:1, cup:150 } },
    { id:'potato', he:'תפוח אדמה', aliases:['תפוחאדמה','תפוא'], per100:{ calories:77, protein:2, carbs:17, fat:0.1 }, units:{ gram:1, piece:150 } },
    { id:'sweet_potato', he:'בטטה', aliases:['בטטה'], per100:{ calories:90, protein:2, carbs:21, fat:0.1 }, units:{ gram:1, piece:130 } },

    { id:'tortilla', he:'טורטיה', aliases:['טורטיה'], per100:{ calories:310, protein:8, carbs:52, fat:8 }, units:{ gram:1, piece:50 } },

    { id:'white_cheese', he:'גבינה לבנה', aliases:['גבינהלבנה'], per100:{ calories:95, protein:10, carbs:4, fat:5 }, units:{ gram:1, tbsp:15, cup:250 } },
    { id:'yellow_cheese', he:'גבינה צהובה', aliases:['גבינהצהובה'], per100:{ calories:356, protein:25, carbs:2.2, fat:27 }, units:{ gram:1, slice:28 } },
    { id:'greek_yogurt', he:'יוגורט יווני', aliases:['יוגורטיווני'], per100:{ calories:97, protein:9, carbs:3.9, fat:5 }, units:{ gram:1, cup:200 } },
    { id:'yogurt', he:'יוגורט', aliases:['יוגורט'], per100:{ calories:60, protein:5, carbs:5, fat:3 }, units:{ gram:1, cup:200 } },
    { id:'yogurt_pro', he:'יוגורט חלבון', aliases:['יוגורטחלבון'], per100:{ calories:73, protein:10, carbs:4, fat:1.7 }, units:{ gram:1, cup:200 } },
    { id:'milk_3', he:'חלב 3%', aliases:['חלב'], per100:{ calories:61, protein:3.3, carbs:4.8, fat:3.2 }, units:{ gram:1, cup:240 } },

    { id:'pear', he:'אגס', aliases:['אגס'], per100:{ calories:57, protein:0.4, carbs:15, fat:0.1 }, units:{ gram:1, piece:160 } },

    { id:'almonds', he:'שקדים', aliases:['שקדים'], per100:{ calories:579, protein:21, carbs:22, fat:50 }, units:{ gram:1, tbsp:10 } },

    { id:'peanut_butter', he:'חמאת בוטנים', aliases:['חמאתבוטנים'], per100:{ calories:588, protein:25, carbs:20, fat:50 }, units:{ gram:1, tbsp:16 } },
    { id:'tahini', he:'טחינה', aliases:['טחינה'], per100:{ calories:595, protein:17, carbs:21, fat:53 }, units:{ gram:1, tbsp:15 } },
    { id:'olive_oil', he:'שמן זית', aliases:['שמןזית'], per100:{ calories:884, protein:0, carbs:0, fat:100 }, units:{ gram:1, tbsp:13, tsp:5 } },
    { id:'hummus', he:'חומוס', aliases:['חומוס'], per100:{ calories:166, protein:8, carbs:14, fat:9.6 }, units:{ gram:1, tbsp:15 } },
    { id:'cucumber', he:'מלפפון', aliases:['מלפפון'], per100:{ calories:15, protein:0.7, carbs:3.6, fat:0.1 }, units:{ gram:1, piece:120 } },
    { id:'tomato', he:'עגבנייה', aliases:['עגבניה'], per100:{ calories:18, protein:0.9, carbs:3.9, fat:0.2 }, units:{ gram:1, piece:120 } },
    { id:'lettuce', he:'חסה', aliases:['חסה'], per100:{ calories:15, protein:1.4, carbs:2.9, fat:0.2 }, units:{ gram:1 } },
    { id:'broccoli', he:'ברוקולי', aliases:['ברוקולי'], per100:{ calories:34, protein:2.8, carbs:7, fat:0.4 }, units:{ gram:1 } },
    { id:'corn', he:'תירס', aliases:['תירס'], per100:{ calories:96, protein:3.4, carbs:21, fat:1.5 }, units:{ gram:1 } },
    { id:'protein_bar', he:'חטיף חלבון', aliases:['חטיף','חטיףחלבון'], per100:{ calories:370, protein:30, carbs:35, fat:12 }, units:{ gram:1, piece:60 } }
  ];

  const state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
    items: [],
    selectedFoodId: null,
    externalFoods: [],
    lastQuery: ''
  };

  const searchInput = document.getElementById('searchInput');
  const resultsList = document.getElementById('resultsList');
  const selectedName = document.getElementById('selectedName');
  const selectedBase = document.getElementById('selectedBase');
  const amountInput = document.getElementById('amountInput');
  const unitSelect = document.getElementById('unitSelect');
  const mealSelect = document.getElementById('mealSelect');
  const addBtn = document.getElementById('addBtn');
  let searchCounter = 0;

  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      items: state.items,
      selectedFoodId: state.selectedFoodId,
      externalFoods: state.externalFoods,
      lastQuery: state.lastQuery
    }));
  }

  function unitLabel(unit){
    return { gram:'גרם', piece:'יחידה', tbsp:'כף', cup:'גביע', slice:'פרוסה', tsp:'כפית' }[unit] || unit;
  }

  function normalizeQuery(q){
    return String(q || '')
      .trim()
      .toLowerCase()
      .replace(/[׳'"`]/g,'')
      .replace(/\s+/g,' ');
  }

  function compactQuery(q){
    return normalizeQuery(q).replace(/\s+/g,'');
  }

  function mapToExternalSearch(q){
    const compact = compactQuery(q);
    return HEB_TO_EN[compact] || normalizeQuery(q);
  }

  function allFoods(){
    return LOCAL_FOODS.concat(state.externalFoods || []);
  }

  function findFood(id){
    return allFoods().find(f => f.id === id) || null;
  }

  function scoreFood(food, query, compact, mapped){
    const names = [food.he].concat(food.aliases || []).map(v => normalizeQuery(v));
    const compactNames = names.map(v => v.replace(/\s+/g,''));
    let score = 0;

    if(mapped && names.includes(mapped)) score = 120;

    names.forEach(name => {
      if(name === query) score = Math.max(score, 100);
      else if(name.startsWith(query)) score = Math.max(score, 85);
      else if(name.includes(query)) score = Math.max(score, 65);
    });

    compactNames.forEach(name => {
      if(name === compact) score = Math.max(score, 95);
      else if(name.startsWith(compact)) score = Math.max(score, 80);
      else if(name.includes(compact)) score = Math.max(score, 60);
    });

    return score;
  }

  function filterFoods(q){
    const query = normalizeQuery(q);
    const compact = compactQuery(q);
    if(!query) return allFoods().slice(0,8);

    const mapped = SYNONYMS[compact] ? normalizeQuery(SYNONYMS[compact]) : '';
    const scored = allFoods()
      .map(food => ({ food, score: scoreFood(food, query, compact, mapped) }))
      .filter(x => x.score > 0)
      .sort((a,b) => b.score - a.score || a.food.he.localeCompare(b.food.he, 'he'));

    return scored.slice(0,12).map(x => x.food);
  }

  async function fetchExternalFoods(q){
    const translated = mapToExternalSearch(q);
    if(!translated || translated.length < 2) return [];

    try {
      const url = OFF_URL + '?search_terms=' + encodeURIComponent(translated) + '&search_simple=1&action=process&json=1&page_size=10';
      const res = await fetch(url);
      const data = await res.json();
      const products = Array.isArray(data.products) ? data.products : [];

      return products.map((p, idx) => {
        const cals = Number(p?.nutriments?.['energy-kcal_100g'] || p?.nutriments?.energy_kcal_100g || 0);
        const protein = Number(p?.nutriments?.proteins_100g || 0);
        const carbs = Number(p?.nutriments?.carbohydrates_100g || 0);
        const fat = Number(p?.nutriments?.fat_100g || 0);

        if(!p?.product_name || !cals) return null;

        return {
          id: 'ext_' + (p.code || idx),
          he: p.product_name,
          aliases: [p.product_name, translated],
          per100: { calories: cals, protein, carbs, fat },
          units: { gram:1, piece:100, tbsp:15, cup:240 },
          source: 'url'
        };
      }).filter(Boolean).slice(0,8);
    } catch (e) {
      return [];
    }
  }

  function gramsFor(food, amount, unit){
    return amount * ((food.units && food.units[unit]) || 1);
  }

  function calc(food, amount, unit){
    const grams = gramsFor(food, amount, unit);
    const factor = grams / 100;
    return {
      grams,
      calories: food.per100.calories * factor,
      protein: food.per100.protein * factor,
      carbs: food.per100.carbs * factor,
      fat: food.per100.fat * factor
    };
  }

  function setSelected(foodId){
    state.selectedFoodId = foodId;
    save();
    renderSelected();
    renderResults(searchInput.value);
  }

  function getSelectedFood(){
    return state.selectedFoodId ? findFood(state.selectedFoodId) : null;
  }

  function renderResults(q){
    const foods = filterFoods(q);
    resultsList.innerHTML = foods.map((food, index) => {
      const extra = food.source === 'url' ? ' • URL' : '';
      return '<div class="result-item ' + (state.selectedFoodId===food.id?'active':'') + '" onclick="setSelected(\'' + food.id + '\')">'
        + '<div><div class="result-title">' + food.he + '</div><div class="result-sub">ל־100 גרם: ' + food.per100.calories + ' קלוריות • חלבון ' + food.per100.protein + ' • פחמימות ' + food.per100.carbs + ' • שומן ' + food.per100.fat + extra + '</div></div>'
        + '<button class="add-mini" onclick="event.stopPropagation(); setSelected(\'' + food.id + '\')">' + (index===0?'✓':'+') + '</button>'
        + '</div>';
    }).join('');

    if(!foods.length){
      resultsList.innerHTML = '<div class="empty">לא נמצאו תוצאות. נסה: חזה עוף, אורז, ביצה, קוטג׳, טחינה, אבוקדו</div>';
    }
  }

  function renderSelected(){
    const food = getSelectedFood();
    if(!food){
      selectedName.textContent = 'לא נבחר מזון';
      selectedBase.textContent = 'כתוב מזון בעברית והמערכת תציע התאמה';
      unitSelect.innerHTML = '<option value="gram">גרם</option><option value="piece">יחידה</option><option value="tbsp">כף</option><option value="cup">גביע</option>';
      document.getElementById('previewCalories').textContent = '0';
      document.getElementById('previewProtein').textContent = '0';
      document.getElementById('previewCarbs').textContent = '0';
      document.getElementById('previewFat').textContent = '0';
      return;
    }

    selectedName.textContent = food.he;
    selectedBase.textContent = (food.source === 'url' ? 'נשלף מ־URL • ' : 'מאגר פנימי בעברית • ') + 'ל־100 גרם: ' + food.per100.calories + ' קלוריות';
    unitSelect.innerHTML = Object.keys(food.units || { gram:1 })
      .map(u => '<option value="' + u + '">' + unitLabel(u) + '</option>')
      .join('');
    updatePreview();
  }

  function updatePreview(){
    const food = getSelectedFood();
    if(!food) return;

    const amount = Number(amountInput.value || 0);
    const unit = unitSelect.value;
    const values = calc(food, amount, unit);

    document.getElementById('previewCalories').textContent = Math.round(values.calories);
    document.getElementById('previewProtein').textContent = Math.round(values.protein);
    document.getElementById('previewCarbs').textContent = Math.round(values.carbs);
    document.getElementById('previewFat').textContent = Math.round(values.fat);
  }

  function addItem(){
    const food = getSelectedFood();
    const amount = Number(amountInput.value || 0);
    const unit = unitSelect.value;
    const meal = mealSelect.value;

    if(!food) return alert('בחר מזון');
    if(!amount || amount <= 0) return alert('הזן כמות תקינה');

    const values = calc(food, amount, unit);

    state.items.push({
      id: Date.now().toString(36),
      foodId: food.id,
      he: food.he,
      meal,
      amount,
      unit,
      calories: values.calories,
      protein: values.protein,
      carbs: values.carbs,
      fat: values.fat
    });

    save();
    renderAll();
  }

  function removeItem(id){
    state.items = state.items.filter(item => item.id !== id);
    save();
    renderAll();
  }

  function totals(items){
    return items.reduce((acc,item) => {
      acc.calories += item.calories;
      acc.protein += item.protein;
      acc.carbs += item.carbs;
      acc.fat += item.fat;
      return acc;
    }, { calories:0, protein:0, carbs:0, fat:0 });
  }

  function renderSummary(){
    const sum = totals(state.items);
    document.getElementById('caloriesValue').textContent = Math.round(sum.calories);
    document.getElementById('goalValue').textContent = GOAL.calories;
    document.getElementById('proteinValue').textContent = Math.round(sum.protein);
    document.getElementById('carbsValue').textContent = Math.round(sum.carbs);
    document.getElementById('fatValue').textContent = Math.round(sum.fat);

    const circumference = 490.1;
    const pct = Math.min(sum.calories / GOAL.calories, 1);
    document.getElementById('progressRing').style.strokeDashoffset = circumference - (circumference * pct);
  }

  function renderMeal(mealKey, listId, totalId){
    const items = state.items.filter(item => item.meal === mealKey);
    const total = totals(items);
    document.getElementById(totalId).textContent = Math.round(total.calories) + ' קלוריות';
    const list = document.getElementById(listId);

    if(!items.length){
      list.innerHTML = '<div class="empty">אין פריטים בארוחה זו</div>';
      return;
    }

    list.innerHTML = items.map(item =>
      '<div class="meal-row"><div><div class="meal-food">' + item.he + '</div><div class="meal-sub">' + item.amount + ' ' + unitLabel(item.unit) + ' • ' + Math.round(item.calories) + ' קלוריות • חלבון ' + Math.round(item.protein) + ' • פחמימות ' + Math.round(item.carbs) + ' • שומן ' + Math.round(item.fat) + '</div></div><button class="remove-btn" onclick="removeItem(\'' + item.id + '\')">מחק</button></div>'
    ).join('');
  }

  function renderAll(){
    renderSummary();
    renderResults(searchInput.value);
    renderSelected();
    renderMeal('breakfast','breakfastList','breakfastTotal');
    renderMeal('lunch','lunchList','lunchTotal');
    renderMeal('dinner','dinnerList','dinnerTotal');
    renderMeal('snack','snackList','snackTotal');
  }

  async function runSearch(q){
    state.lastQuery = q;
    const localBest = filterFoods(q)[0];

    if(localBest){
      state.selectedFoodId = localBest.id;
      save();
      renderAll();
    } else {
      renderResults(q);
    }

    if(q && q.trim().length >= 2){
      const ticket = ++searchCounter;
      const external = await fetchExternalFoods(q);
      if(ticket !== searchCounter) return;

      state.externalFoods = external;
      const bestAfter = filterFoods(q)[0];
      if(bestAfter) state.selectedFoodId = bestAfter.id;
      save();
      renderAll();
    }
  }

  searchInput.addEventListener('input', e => runSearch(e.target.value));
  searchInput.addEventListener('keydown', e => {
    if(e.key === 'Enter'){
      e.preventDefault();
      runSearch(searchInput.value);
      amountInput.focus();
      amountInput.select();
    }
  });

  amountInput.addEventListener('input', updatePreview);
  unitSelect.addEventListener('change', updatePreview);
  addBtn.addEventListener('click', addItem);

  window.setSelected = setSelected;
  window.removeItem = removeItem;
  window.quickSearch = function(v){
    searchInput.value = v;
    runSearch(v);
  };

  renderAll();
</script>
