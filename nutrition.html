<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutrition</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1017;
  color:white;
  max-width:430px;
  margin:auto;
  padding:12px;
}

.header {
  text-align:center;
  font-size:22px;
  margin-bottom:10px;
}

.card {
  background:#111827;
  border-radius:20px;
  padding:15px;
  margin-bottom:10px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.mini {
  background:#1f2937;
  padding:10px;
  border-radius:15px;
  text-align:center;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
  border:none;
  background:#1f2937;
  color:white;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:15px;
  background:#2bd3a0;
  font-weight:bold;
  margin-top:10px;
}

.food {
  display:flex;
  justify-content:space-between;
  margin:6px 0;
  font-size:14px;
}

.cal-circle {
  width:120px;
  height:120px;
  border-radius:50%;
  border:6px solid orange;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-size:20px;
}
</style>
</head>

<body>

<div class="header">מעקב תזונה</div>

<div class="card">
  <div class="cal-circle" id="calCircle">0</div>
</div>

<div class="card grid">
  <div class="mini">חלבון<br><b id="pro">0</b></div>
  <div class="mini">פחמימות<br><b id="carb">0</b></div>
  <div class="mini">שומן<br><b id="fat">0</b></div>
  <div class="mini">קלוריות<br><b id="cal">0</b></div>
</div>

<div class="card">
  <div>הוסף מזון</div>
  <input id="foodName" placeholder="לדוגמה: rice / chicken">
  <input id="amount" placeholder="כמות">
  <select id="unit">
    <option value="1">גרם</option>
    <option value="15">כף</option>
    <option value="250">גביע</option>
  </select>
  <button onclick="searchFood()">הוסף</button>
</div>

<div class="card">
  <div>יומן</div>
  <div id="list"></div>
</div>

<button onclick="back()">חזרה לאימונים</button>

<script>

const API_KEY = "FZ5pPibHVuZ7ZTTNCf7sZCYjfH1alteH2YTdhDP2";

let data = JSON.parse(localStorage.getItem("food")) || [];

async function searchFood(){
  const name = foodName.value;
  const qty = +amount.value;
  const unit = +unitSelect();

  if(!name || !qty) return alert("מלא שם וכמות");

  const res = await fetch(
    `https://api.nal.usda.gov/fdc/v1/foods/search?query=${name}&api_key=${API_KEY}`
  );

  const json = await res.json();
  const food = json.foods[0];

  if(!food) return alert("לא נמצא מזון");

  const nutrients = food.foodNutrients;

  function get(id){
    const n = nutrients.find(x=>x.nutrientId===id);
    return n ? n.value : 0;
  }

  const grams = qty * unit / 100;

  const item = {
    name,
    cal: get(1008)*grams,
    pro: get(1003)*grams,
    carb: get(1005)*grams,
    fat: get(1004)*grams
  };

  data.push(item);
  localStorage.setItem("food", JSON.stringify(data));

  render();
}

function unitSelect(){
  return document.getElementById("unit").value;
}

function render(){
  let c=0,p=0,car=0,f=0;

  list.innerHTML = data.map(x=>{
    c+=x.cal;
    p+=x.pro;
    car+=x.carb;
    f+=x.fat;

    return `
    <div class="food">
      ${x.name}
      <span>${Math.round(x.cal)} קל'</span>
    </div>`;
  }).join("");

  cal.innerText=Math.round(c);
  pro.innerText=Math.round(p);
  carb.innerText=Math.round(car);
  fat.innerText=Math.round(f);
  calCircle.innerText=Math.round(c);
}

function back(){
  window.location.href="index.html";
}

render();

</script>

</body>
</html>
