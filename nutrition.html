<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מעקב גרעון קלורי</title>

  <style>
    :root{--bg:#050b16;--panel:#0d1626;--line:rgba(255,255,255,.08);--text:#f4f8ff;--muted:#9aa8c0;--orange:#f7a536;--purple:#9a63ff;--green:#53d69f;--blue:#62a8ff;--shadow:0 22px 44px rgba(0,0,0,.34)}
    *{box-sizing:border-box}
    html,body{margin:0;background:radial-gradient(circle at top,#0a1425 0%,#050b16 48%,#04070f 100%);color:var(--text);font-family:Inter,Arial,Helvetica,sans-serif}
    body{max-width:430px;margin:0 auto;min-height:100vh;padding:14px 12px 100px}
    button,input,select{font:inherit}

    .topbar{display:grid;grid-template-columns:52px 52px 1fr 52px;gap:10px;align-items:center;margin-bottom:12px}
    .round-btn{width:52px;height:52px;border-radius:50%;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow)}
    .title{font-size:18px;font-weight:900;text-align:center}
    .date-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:14px;color:#dce6f8}
    .date-row .chev{font-size:28px;cursor:pointer}
    .date-row .date{font-size:14px;color:#d3deef;display:flex;align-items:center;gap:8px}
    .date-row button{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#fff;border-radius:12px;padding:6px 10px}

    .backup-row{margin:10px 0;display:flex;gap:10px}
    .backup-row button{flex:1;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.05);color:#fff;font-weight:800}

    .card{background:linear-gradient(180deg,rgba(13,22,38,.98),rgba(10,15,27,.98));border:1px solid var(--line);border-radius:24px;padding:14px;box-shadow:var(--shadow);margin-bottom:14px}
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
    .section-title{font-size:18px;font-weight:900}
    .chip-btn{border:1px solid var(--line);background:rgba(255,255,255,.045);color:#fff;padding:10px 14px;border-radius:16px;font-weight:900}

    .hero{padding:18px 16px 16px;overflow:hidden;border-radius:28px;background:radial-gradient(circle at 22% 45%,rgba(255,158,61,.08),transparent 30%),radial-gradient(circle at 78% 28%,rgba(115,92,255,.07),transparent 34%),linear-gradient(180deg,rgba(12,21,38,.98),rgba(7,12,23,.98))}
    .hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .hero-title{font-size:18px;font-weight:900}
    .hero-grid{display:grid;grid-template-columns:1.05fr .9fr .9fr .9fr;gap:8px;align-items:stretch;direction:ltr;margin-left:-10px;margin-right:10px}
    .calorie-panel{position:relative;min-width:0;min-height:188px;display:flex;align-items:center;justify-content:center;direction:rtl}
    .ring-wrap{position:relative;display:flex;align-items:center;justify-content:center;min-height:180px;width:100%;overflow:hidden}
    .calorie-panel .ring-wrap svg{transform:rotate(-90deg) scale(1.18);transform-origin:center}
    .ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
    .ring-text .main{font-size:31px;font-weight:950;text-shadow:0 2px 0 rgba(255,158,61,.35)}
    .ring-text .sub{font-size:14px;color:#dce7fb;line-height:1.45;margin-top:9px}

    .macro{min-width:0;min-height:188px;border-radius:22px;padding:13px 7px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018));border:1px solid rgba(255,255,255,.09);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 12px 28px rgba(0,0,0,.22);display:flex;flex-direction:column;align-items:center;justify-content:space-between;text-align:center;direction:rtl}
    .macro .label{font-size:14px;font-weight:900}
    .macro .icon{font-size:28px;line-height:1}
    .macro .value{font-size:25px;font-weight:950}
    .macro .unit{font-size:13px;color:#dce7fb;line-height:1.35}
    .macro-progress{width:100%;height:9px;border-radius:999px;background:rgba(255,255,255,.11);overflow:hidden}
    .macro-progress span{display:block;height:100%;width:0%;border-radius:999px;transition:width .25s ease}
    .protein .macro-progress span{background:linear-gradient(90deg,#ffb83f,#ffe08a)}
    .carbs .macro-progress span{background:linear-gradient(90deg,#54d66a,#b9f56b)}
    .fat .macro-progress span{background:linear-gradient(90deg,#4f9cff,#77d9ff)}
    .goal-row{margin-top:14px;color:#c2cce0;text-align:center;font-size:14px}
    .burn-row{margin-top:10px;color:#8ff0c1;text-align:center;font-size:14px;font-weight:900}

    .profile-panel{display:none}
    .profile-panel.show{display:block}
    .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .profile-note{color:var(--muted);font-size:12px;line-height:1.5;margin-top:10px}
    .profile-actions{display:flex;gap:10px;margin-top:14px}
    .profile-actions button{flex:1}
    .secondary-btn{padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.045);color:#fff;font-weight:900}
    .primary-btn{padding:14px;border-radius:16px;border:none;background:linear-gradient(135deg,#7a5cff,#a86bff);color:#fff;font-weight:900}

    .search-card{padding:16px}
    .search-input{width:100%;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px;font-size:16px;color:#fff;outline:none;text-align:right}
    .search-input::placeholder{color:#8fa3c7}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .chip{padding:9px 15px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#dbe7ff;font-size:13px;font-weight:800;cursor:pointer}
    .results-title{font-size:18px;font-weight:900;margin:20px 4px 10px}
    .result-card{padding:16px;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018));border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow);margin-bottom:14px}
    .result-name{font-size:20px;font-weight:900}
    .result-sub{color:var(--muted);font-size:13px;margin-top:6px}

    .fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .field{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px}
    .field.full{grid-column:1/-1}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px}
    .field input,.field select{width:100%;border:none;outline:none;background:transparent;color:#fff;font-size:18px;font-weight:900}

    .food-add-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .food-add-box{min-height:96px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:12px;display:flex;flex-direction:column;justify-content:center}
    .food-add-box label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px}
    .food-add-box input,.food-add-box select{width:100%;border:none;outline:none;background:transparent;color:#fff;font-size:18px;font-weight:900}
    .food-add-box select option{background:#0d1626;color:#fff}
    .food-add-values{display:grid;gap:4px}
    .food-add-values div{display:flex;justify-content:space-between;gap:8px;font-size:13px;color:#dce7fb;font-weight:800}
    .food-add-values b{color:#fff;font-size:15px}

    .add-btn{margin-top:16px;width:100%;padding:16px;border:none;border-radius:18px;background:linear-gradient(135deg,#7a5cff,#a86bff);color:#fff;font-size:17px;font-weight:900;cursor:pointer}

    .meal-card{padding:14px}
    .meal-block{border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:12px;background:rgba(255,255,255,.015)}
    .meal-row-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .meal-total,.meal-label{font-weight:900}
    .food-table{width:100%;border-collapse:collapse;font-size:12px}
    .food-table th,.food-table td{padding:8px 6px;border-bottom:1px solid rgba(255,255,255,.05);text-align:right;vertical-align:top}
    .food-table th{color:var(--muted)}
    .food-table td strong{display:block;font-size:14px}
    .food-table td span{color:var(--muted);display:block;margin-top:3px}
    .accordion{margin-top:12px;display:grid;gap:10px}
    .acc-item{border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:14px;background:rgba(255,255,255,.015)}
    .acc-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
    .acc-body{display:none;padding-top:10px}
    .acc-item.open .acc-body{display:block}
    .food-item{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-top:1px solid rgba(255,255,255,.05)}
    .food-item .meta{font-size:12px;color:var(--muted);margin-top:4px}
    .remove{border:none;background:rgba(255,80,80,.10);border:1px solid rgba(255,110,110,.22);color:#ffd6d6;padding:8px 10px;border-radius:12px;cursor:pointer;font-weight:900;font-size:12px}

    .bottom-grid{display:grid;grid-template-columns:1.35fr .9fr;gap:14px}
    .chart-card,.side-card{background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:12px}
    .chart-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .mini-btn{border:1px solid rgba(154,99,255,.35);background:rgba(154,99,255,.08);color:#c58cff;padding:8px 12px;border-radius:12px;font-weight:800}
    #deficitChart{width:100%;height:220px;display:block}
    .success{margin-top:12px;border:1px solid rgba(83,214,159,.28);background:rgba(83,214,159,.08);color:#8ff0c1;border-radius:16px;padding:14px;font-weight:800;text-align:center}
    .side-card .h{font-size:18px;font-weight:900}
    .side-card .s{font-size:13px;color:var(--muted);margin-top:4px}
    .side-card .big{font-size:48px;font-weight:900;line-height:1;color:#59db91;margin-top:14px}
    .side-card .unit{font-size:20px;font-weight:900;color:#59db91}
    .status{margin-top:18px;border-radius:16px;background:rgba(83,214,159,.14);color:#86efb2;text-align:center;padding:14px;font-size:24px;font-weight:900}
    .fullstats{margin-top:12px;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:14px;color:#dde7fa;display:flex;justify-content:space-between;align-items:center;cursor:pointer}

    .stats-modal{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.68);display:none;align-items:flex-end;justify-content:center;padding:0 12px}
    .stats-modal.show{display:flex}
    .stats-sheet{width:100%;max-width:430px;max-height:88vh;overflow:auto;background:linear-gradient(180deg,#101b2e,#07101d);border:1px solid rgba(255,255,255,.10);border-radius:28px 28px 0 0;padding:18px;box-shadow:0 -20px 50px rgba(0,0,0,.45)}
    .stats-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .stats-title{font-size:22px;font-weight:950}
    .close-stats{border:none;border-radius:14px;padding:10px 14px;background:rgba(255,255,255,.08);color:#fff;font-weight:900;cursor:pointer}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .stat-box{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);border-radius:18px;padding:14px;text-align:center}
    .stat-box b{display:block;font-size:24px;color:#53d69f}
    .stat-box span{font-size:12px;color:#9aa8c0}
    .stats-section{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.025);border-radius:20px;padding:14px;margin-top:12px}
    .stats-row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.06);padding:10px 0;gap:10px}
    .stats-row:last-child{border-bottom:none}
    .stats-row b{color:#dfffee}
    .stats-note{font-size:12px;color:#9aa8c0;line-height:1.55;margin-top:10px}

    @media(max-width:390px){
      .hero-grid{grid-template-columns:1fr .88fr .88fr .88fr;gap:6px;margin-left:-8px;margin-right:8px}
      .calorie-panel,.macro{min-height:162px}
      .calorie-panel .ring-wrap{min-height:158px}
      .calorie-panel .ring-wrap svg{transform:rotate(-90deg) scale(.72);transform-origin:center}
      .macro{border-radius:20px;padding:11px 5px}
      .macro .label{font-size:12px}.macro .icon{font-size:24px}.macro .value{font-size:22px}.macro .unit{font-size:12px}
      .bottom-grid,.fields{grid-template-columns:1fr}
      .topbar{grid-template-columns:46px 46px 1fr 46px}
      .round-btn{width:46px;height:46px}
    }
  </style>
</head>

<body>

  <div class="backup-row">
    <button onclick="exportData()">📤 ייצוא נתונים</button>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)" />
    <button onclick="document.getElementById('importFile').click()">📥 ייבוא נתונים</button>
  </div>

  <div class="topbar">
    <button class="round-btn" onclick="location.href='index.html'">✕</button>
    <button class="round-btn">↓</button>
    <div class="title">מעקב גרעון קלורי</div>
    <button class="round-btn">⋮</button>
  </div>

  <div class="date-row">
    <div class="chev" id="prevDay">‹</div>
    <div class="date">
      📅 <span id="currentDateLabel"></span>
      <button onclick="goToday()">היום</button>
    </div>
    <div class="chev" id="nextDay">›</div>
  </div>

  <div class="card hero">
    <div class="hero-top">
      <div style="display:flex;gap:8px;align-items:center">
        <button class="chip-btn" onclick="toggleProfile()">⚙️ התאמה אישית</button>
        <button class="chip-btn">🎯 יעדים</button>
      </div>
      <div class="hero-title">סיכום יומי</div>
    </div>

    <div class="hero-grid">
      <div class="calorie-panel">
        <div class="ring-wrap">
          <svg width="196" height="196" viewBox="0 0 196 196">
            <circle cx="98" cy="98" r="78" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="16"></circle>
            <circle id="progressRing" cx="98" cy="98" r="78" fill="none" stroke="var(--orange)" stroke-width="16" stroke-linecap="round" stroke-dasharray="490.1" stroke-dashoffset="490.1"></circle>
          </svg>
          <div class="ring-text">
            <div class="main" id="caloriesValue">0</div>
            <div class="sub"><span id="goalValue">1758</span> /<br>קלוריות</div>
          </div>
        </div>
      </div>

      <div class="macro protein">
        <div class="label">חלבון</div><div class="icon">💪</div>
        <div class="value"><span id="proteinValue">0</span></div>
        <div class="unit">גר׳ / <span id="proteinGoal">169</span></div>
        <div class="macro-progress"><span id="proteinBar"></span></div>
      </div>

      <div class="macro carbs">
        <div class="label">פחמימות</div><div class="icon">🌿</div>
        <div class="value"><span id="carbsValue">0</span></div>
        <div class="unit">גר׳ / <span id="carbsGoal">132</span></div
