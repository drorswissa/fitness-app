<script>

const weight = 94.1;
const goalCalories = Math.round(weight * 24 - 500);
goal.innerText = goalCalories;

let data = JSON.parse(localStorage.getItem("food")) || [];

const dict = {
 "עוף":"chicken",
 "חזה עוף":"chicken breast",
 "אורז":"rice",
 "ביצה":"egg",
 "טונה":"tuna",
 "גבינה":"cheese",
 "לחם":"bread",
 "בננה":"banana",
 "תפוח":"apple",
 "חלב":"milk"
};

let selected = null;

/* 🔍 חיפוש חכם */
search.oninput = async (e) => {
 let q = e.target.value.trim();
 if (q.length < 2) {
   results.innerHTML = "";
   return;
 }

 let query = dict[q] || q;

 try {
   const res = await fetch(
     `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${query}&search_simple=1&action=process&json=1&page_size=10`
   );

   const d = await res.json();

   results.innerHTML = d.products
     .filter(p => p.product_name)
     .slice(0, 6)
     .map(p => `
       <div class="result" onclick='selectFood(${JSON.stringify(p)})'>
         <b>${p.product_name}</b><br>
         <small>${Math.round(p.nutriments.energy_kcal_100g || 0)} קלוריות ל-100ג'</small>
       </div>
     `).join("");

 } catch (err) {
   results.innerHTML = "<div>שגיאה בחיפוש</div>";
 }
};

/* בחירת מזון */
function selectFood(p){
 selected = p;
 results.innerHTML = `
   <div style="padding:12px;color:#22c55e">
   ✔ נבחר: ${p.product_name}
   </div>
 `;
}

/* הוספה */
function addFood(){
 if(!selected) return alert("בחר מזון קודם");

 let item = {
  name: selected.product_name,
  cal: selected.nutriments.energy_kcal_100g || 0,
  pro: selected.nutriments.proteins_100g || 0,
  carb: selected.nutriments.carbohydrates_100g || 0,
  fat: selected.nutriments.fat_100g || 0,
  img: selected.image_front_thumb_url || selected.image_url || ""
 };

 data.push(item);
 localStorage.setItem("food", JSON.stringify(data));
 selected = null;
 render();
}

/* רינדור */
function render(){
 let c=0,p=0,car=0,f=0;

 log.innerHTML = data.map(x=>{
   c+=x.cal;
   p+=x.pro;
   car+=x.carb;
   f+=x.fat;

   return `
   <div class="food">
     <img src="${x.img || 'https://via.placeholder.com/50'}">
     <div>
       ${x.name}<br>
       <small>${Math.round(x.cal)} קלוריות</small>
     </div>
   </div>`;
 }).join("");

 cal.innerText = Math.round(c);
 pro.innerText = Math.round(p);
 carb.innerText = Math.round(car);
 fat.innerText = Math.round(f);

 let percent = c / goalCalories;
 progress.style.strokeDashoffset = 470 - (470 * percent);
}

render();

</script>
