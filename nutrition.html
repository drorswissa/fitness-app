<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>מעקב תזונה</title>
<style>
:root{--bg:#050b16;--line:rgba(255,255,255,.08);--text:#f4f8ff;--muted:#9aa8c0;--orange:#f7a536;--green:#53d69f;--blue:#62a8ff;--shadow:0 22px 44px rgba(0,0,0,.34)}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#0a1425 0%,#050b16 50%,#04070f 100%);color:var(--text);font-family:Arial;max-width:430px;margin:auto;padding:14px}
.card{background:linear-gradient(180deg,rgba(13,22,38,.98),rgba(10,15,27,.98));border:1px solid var(--line);border-radius:28px;padding:16px;box-shadow:var(--shadow)}
.hero-grid{display:grid;grid-template-columns:1.05fr .9fr .9fr .9fr;gap:8px}
.cal{display:flex;align-items:center;justify-content:center}
.ring{width:130px;height:130px;border-radius:50%;border:14px solid rgba(255,255,255,.08);border-top-color:var(--orange);display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring b{font-size:34px}
.macro{border-radius:22px;padding:12px;text-align:center;border:1px solid rgba(255,255,255,.1)}
.bar{height:8px;background:rgba(255,255,255,.1);border-radius:999px}
.goal-row{margin-top:14px;text-align:center}
.burn{color:#8ff0c1;font-weight:900}
</style>
</head>
<body>
<div class="card">
<div class="hero-grid">
<div class="cal"><div class="ring"><b id="cal">0</b><span id="goal">/ 1758 קלוריות</span></div></div>
<div class="macro">חלבון<br><b id="protein">0</b></div>
<div class="macro">פחמימות<br><b id="carbs">0</b></div>
<div class="macro">שומן<br><b id="fat">0</b></div>
</div>

<div class="goal-row">
🔥 יעד קלורי יומי: <span id="goalLine">1758</span> קל׳ 
<span class="burn">🏋️ שרפת באימון: <span id="burn">0</span> קל׳</span>
<br>
גרעון כולל: <span id="deficit">0</span> קל׳
</div>
</div>

<script>
const GOAL=1758;
const STORAGE_KEY='workout_app_v2_clean_new';
const weight=94.1;

function getWorkoutCalories(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return 0;
    const data=JSON.parse(raw);
    const sec=data?.timers?.workoutSeconds||0;
    const min=sec/60;
    return Math.round(min*weight*0.08);
  }catch(e){return 0}
}

function render(){
  const burned=getWorkoutCalories();
  document.getElementById('burn').innerText=burned;

  const eaten=224; // לא נוגע בלוגיקה שלך
  document.getElementById('cal').innerText=eaten;
  document.getElementById('goal').innerText='/ '+GOAL+' קלוריות';

  const deficit=(GOAL-eaten)+burned;
  document.getElementById('deficit').innerText=deficit;
}

render();
</script>
</body>
</html>
