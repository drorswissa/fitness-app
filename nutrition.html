<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutrition PRO</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#070b12;
  color:white;
  max-width:430px;
  margin:auto;
  padding:12px;
}

/* HEADER */
.title {
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}

/* CIRCLE */
.circle {
  width:140px;
  height:140px;
  border-radius:50%;
  border:10px solid #fb923c;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-size:26px;
  font-weight:bold;
}

/* CARDS */
.card {
  background:#111827;
  border-radius:20px;
  padding:14px;
  margin-bottom:10px;
}

/* MACROS */
.macro {
  display:flex;
  justify-content:space-between;
  margin-top:8px;
}

.bar {
  height:6px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.bar span {
  display:block;
  height:100%;
}

/* INPUT */
input, select {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  background:#1f2937;
  color:white;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  margin-top:10px;
  font-weight:bold;
}

/* SEARCH RESULTS */
.item {
  padding:10px;
  border-bottom:1px solid #222;
  cursor:pointer;
}

.small {font-size:12px;color:#aaa}
</style>
</head>

<body>

<div class="title">מעקב תזונה</div>

<div class="card">
  <div class="circle" id="cal">0</div>
  <div class="small" style="text-align:center;margin-top:5px">
    יעד יומי: <span id="goalCal"></span>
  </div>
</div>

<div class="card">

  <div class="macro">
    חלבון <span id="pro">0</span>
  </div>
  <div class="bar"><span id="proBar" style="background:#8b5cf6;width:0%"></span></div>

  <div class="macro">
    פחמימות <span id="carb">0</span>
  </div>
  <div class="bar"><span id="carbBar" style="background:#22c55e;width:0%"></span></div>

  <div class="macro">
    שומן <span id="fat">0</span>
  </div>
  <div class="bar"><span id="fatBar" style="background:#facc15;width:0%"></span></div>

</div>

<div class="card">
  <input id="search" placeholder="חפש מזון בעברית (אורז, עוף...)" />
  <div id="results"></div>
</div>

<div class="card">
  <select id="unit">
    <option value="gram">גרם</option>
    <option value="tbsp">כף</option>
    <option value="cup">גביע</option>
  </select>

  <input id="amount" placeholder="כמות" type="number" />

  <button onclick="addFood()">הוסף</button>
</div>

<div class="card" id="log"></div>

<script>
const weight = 94.1;
const maintenance = weight * 24;
const goalCalories = Math.round(maintenance - 500);

const proteinGoal = Math.round(weight * 1.8);
const fatGoal = Math.round(weight * 0.8);
const carbGoal = Math.round((goalCalories - (proteinGoal*4 + fatGoal*9)) / 4);

goalCal.innerText = goalCalories;

let data = JSON.parse(localStorage.getItem("food")) || [];

const translate = {
  "אורז":"rice",
  "עוף":"chicken",
  "ביצה":"egg",
  "חלב":"milk",
  "גבינה":"cheese",
  "קוטג":"cottage",
  "בננה":"banana"
};

async function searchFood(q){
  if(!q)return;

  if(translate[q]) q = translate[q];

  const res = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${q}&search_simple=1&action=process&json=1&page_size=5`);
  const d = await res.json();

  results.innerHTML = d.products.map(p=>`
    <div class="item" onclick='selectFood(${JSON.stringify(p)})'>
      ${p.product_name || "מוצר"}
      <div class="small">${p.nutriments?.energy_kcal_100g || 0} קלוריות</div>
    </div>
  `).join("");
}

let selected;

function selectFood(p){
  selected = p;
  results.innerHTML = "נבחר: " + (p.product_name || "");
}

function convert(amount,unit){
  if(unit==="tbsp") return amount*15;
  if(unit==="cup") return amount*240;
  return amount;
}

function addFood(){
  if(!selected)return;

  const grams = convert(+amount.value,unit.value);

  const item = {
    cal:(selected.nutriments.energy_kcal_100g||0)/100*grams,
    pro:(selected.nutriments.proteins_100g||0)/100*grams,
    carb:(selected.nutriments.carbohydrates_100g||0)/100*grams,
    fat:(selected.nutriments.fat_100g||0)/100*grams,
    name:selected.product_name
  };

  data.push(item);
  localStorage.setItem("food",JSON.stringify(data));

  render();
}

function render(){
  let c=0,p=0,car=0,f=0;

  log.innerHTML = data.map(x=>{
    c+=x.cal;p+=x.pro;car+=x.carb;f+=x.fat;
    return `<div>${x.name}</div>`;
  }).join("");

  cal.innerText = Math.round(c);

  pro.innerText = Math.round(p);
  carb.innerText = Math.round(car);
  fat.innerText = Math.round(f);

  proBar.style.width = (p/proteinGoal*100)+"%";
  carbBar.style.width = (car/carbGoal*100)+"%";
  fatBar.style.width = (f/fatGoal*100)+"%";
}

search.oninput = e=>searchFood(e.target.value);

render();
</script>

</body>
</html>
