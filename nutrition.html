<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nutrition</title>
  <style>
    :root {
      --bg: #070b12;
      --panel: #0d1320;
      --panel-2: #101828;
      --panel-3: #131d2f;
      --line: rgba(255,255,255,.08);
      --text: #f5f7fb;
      --muted: #9ba8c7;
      --purple: #9f67ff;
      --green: #36d39a;
      --yellow: #f7c948;
      --orange: #ffae35;
      --red: #ff6b6b;
      --shadow: 0 18px 40px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #0b1321 0%, #070b12 45%, #05070c 100%);
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 14px 12px 28px;
    }
    .card {
      background: linear-gradient(180deg, rgba(17,24,39,.95), rgba(10,16,28,.95));
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 12px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .icon-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
    }
    .title {
      flex: 1;
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: .2px;
    }
    .date-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      margin: 10px 0 4px;
    }
    .date-nav {
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
      padding: 0 8px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 800;
      margin: 0 0 10px;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: 1.35fr 1fr 1fr 1fr;
      gap: 10px;
      align-items: stretch;
    }
    .circle-card {
      background: rgba(255,255,255,.02);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .circle-wrap {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 8px auto 2px;
    }
    .circle-wrap svg {
      width: 140px;
      height: 140px;
      transform: rotate(-90deg);
    }
    .circle-center {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2px;
      text-align: center;
    }
    .circle-center strong { font-size: 18px; }
    .circle-center span { color: var(--muted); font-size: 13px; }
    .macro-card {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      min-height: 140px;
    }
    .macro-head { font-size: 13px; color: var(--muted); }
    .macro-val { font-size: 18px; font-weight: 800; }
    .macro-sub { font-size: 12px; color: var(--muted); }
    .progress {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
    }
    .progress > span {
      display: block;
      height: 100%;
      border-radius: 999px;
    }
    .purple { background: var(--purple); }
    .green { background: var(--green); }
    .yellow { background: var(--yellow); }
    .hint-line {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      text-align: center;
    }
    .meal-box {
      background: rgba(255,255,255,.02);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      margin-top: 10px;
    }
    .meal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
    }
    .meal-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .meal-kcal { font-size: 14px; font-weight: 800; }
    .meal-kcal.orange { color: var(--orange); }
    .meal-kcal.green { color: var(--green); }
    .meal-kcal.blue { color: #58b7ff; }
    .meal-kcal.purple { color: var(--purple); }
    .meal-name { font-size: 17px; font-weight: 800; }
    .meal-body { margin-top: 10px; }
    .food-row {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .food-row:last-child { border-bottom: none; }
    .food-thumb {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
    }
    .food-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .food-title { font-size: 15px; font-weight: 700; }
    .food-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .food-macros {
      display: grid;
      grid-template-columns: repeat(4, minmax(42px, auto));
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }
    .food-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: stretch;
    }
    .tiny-btn {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      color: var(--text);
      border-radius: 12px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 12px;
      min-width: 68px;
    }
    .tiny-btn.danger { color: #ffc5c5; border-color: rgba(255,107,107,.25); background: rgba(255,107,107,.08); }
    .add-food-inline {
      margin-top: 10px;
      width: 100%;
      border: 1px dashed rgba(159,103,255,.45);
      color: var(--purple);
      background: rgba(159,103,255,.08);
      border-radius: 14px;
      padding: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .weight-layout {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 14px;
      align-items: stretch;
    }
    .weight-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .secondary-btn {
      border: 1px solid rgba(159,103,255,.35);
      background: rgba(159,103,255,.08);
      color: #d9c4ff;
      border-radius: 14px;
      padding: 10px 14px;
      cursor: pointer;
    }
    .weight-current {
      text-align: right;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }
    .weight-current .label { color: var(--muted); font-size: 14px; }
    .weight-current .value { font-size: 56px; font-weight: 800; line-height: 1; }
    .weight-current .sub { color: var(--muted); font-size: 14px; }
    .weight-chart {
      width: 100%;
      height: 220px;
      display: block;
      margin-top: 6px;
    }
    .bottom-nav {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .nav-btn {
      border-radius: 20px;
      padding: 14px 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--text);
      cursor: pointer;
      text-align: center;
      font-size: 13px;
    }
    .nav-btn.active {
      background: linear-gradient(180deg, rgba(159,103,255,.22), rgba(159,103,255,.12));
      border-color: rgba(159,103,255,.28);
      color: #e4d8ff;
      font-weight: 800;
    }
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.56);
      display: none;
      z-index: 40;
    }
    .sheet-backdrop.open { display: block; }
    .sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 430px;
      margin: 0 auto;
      background: #0c1320;
      border: 1px solid var(--line);
      border-radius: 28px 28px 0 0;
      padding: 16px 14px 22px;
      display: none;
      z-index: 50;
      max-height: 78vh;
      overflow: auto;
      box-shadow: var(--shadow);
    }
    .sheet.open { display: block; }
    .sheet-title { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
    .input, .select {
      width: 100%;
      background: #1b263a;
      color: var(--text);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 16px;
      padding: 14px 14px;
      margin-bottom: 10px;
      outline: none;
      font-size: 15px;
    }
    .sheet-row {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 10px;
    }
    .sheet-primary {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(180deg, #38d39b, #27bc86);
      color: #052216;
      font-weight: 800;
      cursor: pointer;
      margin-top: 6px;
      font-size: 16px;
    }
    .autocomplete {
      display: grid;
      gap: 8px;
      margin: 0 0 10px;
    }
    .autocomplete-item {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      cursor: pointer;
    }
    .autocomplete-item strong { display: block; font-size: 14px; }
    .autocomplete-item span { color: var(--muted); font-size: 12px; display: block; margin-top: 3px; }
    .empty {
      padding: 12px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,.10);
      border-radius: 16px;
    }
    @media (max-width: 390px) {
      .summary-grid, .weight-layout { grid-template-columns: 1fr; }
      .food-row { grid-template-columns: 44px 1fr; }
      .food-actions { grid-column: 2; flex-direction: row; }
      .bottom-nav { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="topbar">
        <div class="top-actions">
          <button class="icon-btn" title="תפריט">⋮</button>
          <button class="icon-btn" id="backBtn" title="חזרה">←</button>
        </div>
        <div class="title">מעקב תזונה</div>
        <button class="icon-btn" id="openWeightSheetTopBtn" title="הוסף משקל">＋</button>
      </div>
      <div class="date-row">
        <button class="date-nav" id="prevDateBtn">‹</button>
        <span id="dateLabel"></span>
        <button class="date-nav" id="nextDateBtn">›</button>
      </div>
    </div>

    <div class="card">
      <div class="section-title">סיכום יומי</div>
      <div class="summary-grid">
        <div class="circle-card">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
            <span style="font-size:13px;color:var(--muted);">יעדים</span>
            <span style="font-size:13px;color:var(--muted);">🔥</span>
          </div>
          <div class="circle-wrap">
            <svg viewBox="0 0 140 140">
              <circle cx="70" cy="70" r="54" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="10"></circle>
              <circle id="calorieRing" cx="70" cy="70" r="54" fill="none" stroke="var(--orange)" stroke-linecap="round" stroke-width="10" stroke-dasharray="339.292" stroke-dashoffset="339.292"></circle>
            </svg>
            <div class="circle-center">
              <strong id="dailyCalories">0</strong>
              <span>/ <span id="calorieGoalLabel">2300</span> קק״ל</span>
            </div>
          </div>
          <div class="hint-line">יעד קלורי יומי: <span id="goalHintLabel">2300</span> קק״ל</div>
        </div>

        <div class="macro-card">
          <div class="macro-head">חלבון</div>
          <div class="macro-val" id="dailyProtein">0</div>
          <div class="macro-sub">/ <span id="proteinGoalLabel">160</span> גרם</div>
          <div class="progress"><span id="proteinFill" class="purple" style="width:0%"></span></div>
        </div>

        <div class="macro-card">
          <div class="macro-head">פחמימות</div>
          <div class="macro-val" id="dailyCarbs">0</div>
          <div class="macro-sub">/ <span id="carbsGoalLabel">250</span> גרם</div>
          <div class="progress"><span id="carbsFill" class="green" style="width:0%"></span></div>
        </div>

        <div class="macro-card">
          <div class="macro-head">שומן</div>
          <div class="macro-val" id="dailyFat">0</div>
          <div class="macro-sub">/ <span id="fatGoalLabel">70</span> גרם</div>
          <div class="progress"><span id="fatFill" class="yellow" style="width:0%"></span></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">יומן אוכל</div>
      <div id="mealsContainer"></div>
    </div>

    <div class="card">
      <div class="weight-top">
        <div class="section-title" style="margin:0;">מעקב משקל</div>
        <button class="secondary-btn" id="openWeightSheetBtn">＋ הוסף משקל</button>
      </div>
      <div class="weight-layout">
        <div>
          <svg class="weight-chart" id="weightChart" viewBox="0 0 360 220"></svg>
        </div>
        <div class="weight-current">
          <div class="label">משקל נוכחי</div>
          <div class="value" id="currentWeight">--</div>
          <div class="sub" id="weightDeltaLabel">אין מספיק נתונים</div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-btn" id="navProfileBtn">פרופיל</button>
      <button class="nav-btn" id="navReportsBtn">דוחות</button>
      <button class="nav-btn active">תזונה</button>
      <button class="nav-btn" id="navWorkoutBtn">אימונים</button>
    </div>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>

  <div class="sheet" id="foodSheet">
    <div class="sheet-title">הוסף מזון</div>
    <input class="input" id="foodSearchInput" placeholder="חפש מזון בעברית, לדוגמה: אורז, ביצה, חזה עוף" autocomplete="off" />
    <div class="autocomplete" id="autocompleteList"></div>
    <select class="select" id="mealSelect"></select>
    <div class="sheet-row">
      <input class="input" id="amountInput" type="number" min="0" step="0.1" placeholder="כמות" />
      <select class="select" id="unitSelect"></select>
    </div>
    <button class="sheet-primary" id="addFoodBtn">הוסף ליומן</button>
  </div>

  <div class="sheet" id="weightSheet">
    <div class="sheet-title">הוסף משקל</div>
    <input class="input" id="weightInput" type="number" min="1" step="0.1" placeholder="משקל בק״ג" />
    <button class="sheet-primary" id="addWeightBtn">שמור משקל</button>
  </div>

  <script>

    function defaultState() {

      return {

        ],
        weights: [
          { date: offsetDate(-6), value: 80.8 },
          { date: offsetDate(-5), value: 80.1 },
          { date: offsetDate(-4), value: 79.9 },
          { date: offsetDate(-3), value: 80.0 },
          { date: offsetDate(-2), value: 79.7 },
          { date: offsetDate(-1), value: 79.2 },
          { date: today, value: 78.8 }
        ],
        mealOpen: { breakfast: true, lunch: false, dinner: false, snacks: false }
      };
    }

    function uid() { return 'id-' + Math.random().toString(36).slice(2, 10); }
    function dateKey(d) {
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }
    function parseDate(key) {
      const [y,m,d] = key.split('-').map(Number);
      return new Date(y, m - 1, d);
    }
    function offsetDate(days) {
      const d = new Date();
      d.setDate(d.getDate() + days);
      return dateKey(d);
    }
    function formatDisplayDate(key) {
      const d = parseDate(key);
      return d.toLocaleDateString('he-IL', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    }
    function load() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState();
      } catch {
        return defaultState();
      }
    }
    let state = load();
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function getFoodById(id) { return FOOD_DB.find(f => f.id === id); }
    function getMealByKey(key) { return MEALS.find(m => m.key === key); }
    function gramsForEntry(entry) {
      const food = getFoodById(entry.foodId);
      return entry.amount * (food.units[entry.unit] || 1);
    }
    function macrosForEntry(entry) {
      const food = getFoodById(entry.foodId);
      const grams = gramsForEntry(entry);
      return {
        calories: grams * food.macrosPerGram.calories,
        protein: grams * food.macrosPerGram.protein,
        carbs: grams * food.macrosPerGram.carbs,
        fat: grams * food.macrosPerGram.fat
      };
    }
    function foodsOfCurrentDate() {
      return state.foods.filter(f => f.date === state.currentDate);
    }
    function totals() {
      return foodsOfCurrentDate().reduce((acc, entry) => {
        const v = macrosForEntry(entry);
        acc.calories += v.calories;
        acc.protein += v.protein;
        acc.carbs += v.carbs;
        acc.fat += v.fat;
        return acc;
      }, { calories:0, protein:0, carbs:0, fat:0 });
    }
    function mealTotals(mealKey) {
      return foodsOfCurrentDate().filter(f => f.mealKey === mealKey).reduce((acc, entry) => {
        const v = macrosForEntry(entry);
        acc.calories += v.calories;
        acc.protein += v.protein;
        acc.carbs += v.carbs;
        acc.fat += v.fat;
        return acc;
      }, { calories:0, protein:0, carbs:0, fat:0 });
    }
    function percent(value, goal) {
      return Math.max(0, Math.min(100, (value / goal) * 100));
    }

    let selectedFoodId = '';

    function renderSummary() {
      const t = totals();
      document.getElementById('dailyCalories').textContent = Math.round(t.calories).toLocaleString('he-IL');
      document.getElementById('dailyProtein').textContent = Math.round(t.protein);
      document.getElementById('dailyCarbs').textContent = Math.round(t.carbs);
      document.getElementById('dailyFat').textContent = Math.round(t.fat);
      document.getElementById('calorieGoalLabel').textContent = GOALS.calories.toLocaleString('he-IL');
      document.getElementById('goalHintLabel').textContent = GOALS.calories.toLocaleString('he-IL');
      document.getElementById('proteinGoalLabel').textContent = GOALS.protein;
      document.getElementById('carbsGoalLabel').textContent = GOALS.carbs;
      document.getElementById('fatGoalLabel').textContent = GOALS.fat;
      document.getElementById('proteinFill').style.width = percent(t.protein, GOALS.protein) + '%';
      document.getElementById('carbsFill').style.width = percent(t.carbs, GOALS.carbs) + '%';
      document.getElementById('fatFill').style.width = percent(t.fat, GOALS.fat) + '%';
      const circumference = 339.292;
      const pct = percent(t.calories, GOALS.calories);
      document.getElementById('calorieRing').style.strokeDashoffset = circumference - (pct / 100) * circumference;
    }

    function renderMeals() {
      const container = document.getElementById('mealsContainer');
      container.innerHTML = MEALS.map(meal => {
        const items = foodsOfCurrentDate().filter(item => item.mealKey === meal.key);
        const mealTotal = mealTotals(meal.key);
        const isOpen = !!state.mealOpen[meal.key];
        return `
          <div class="meal-box">
            <div class="meal-header" onclick="toggleMeal('${meal.key}')">
              <div class="meal-header-left">
                <span style="font-size:22px;">${isOpen ? '⌄' : '›'}</span>
                <span class="meal-kcal ${meal.colorClass}">${Math.round(mealTotal.calories)} קק״ל</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-size:20px;">${meal.icon}</span>
                <span class="meal-name">${meal.name}</span>
              </div>
            </div>
            ${isOpen ? `
              <div class="meal-body">
                ${items.length ? items.map(item => foodRowHtml(item)).join('') : '<div class="empty">אין עדיין מזונות בארוחה זו</div>'}
                <button class="add-food-inline" onclick="openFoodSheet('${meal.key}')">＋ הוסף מזון</button>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    function foodRowHtml(entry) {
      const food = getFoodById(entry.foodId);
      const vals = macrosForEntry(entry);
      const amountLabel = `${entry.amount} ${UNIT_LABELS[entry.unit] || entry.unit}`;
      return `
        <div class="food-row">
          <div class="food-thumb"><img src="${food.image}" alt="${escapeHtml(food.name)}"></div>
          <div>
            <div class="food-title">${escapeHtml(food.name)}</div>
            <div class="food-sub">${amountLabel}</div>
            <div class="food-macros">
              <span>קק״ל ${Math.round(vals.calories)}</span>
              <span>חלבון ${Math.round(vals.protein)}</span>
              <span>פחמ׳ ${Math.round(vals.carbs)}</span>
              <span>שומן ${Math.round(vals.fat)}</span>
            </div>
          </div>
          <div class="food-actions">
            <button class="tiny-btn danger" onclick="removeFood('${entry.id}')">מחק</button>
          </div>
        </div>
      `;
    }

    function renderWeight() {
      const sorted = [...state.weights].sort((a,b) => a.date.localeCompare(b.date));
      const current = sorted[sorted.length - 1];
      document.getElementById('currentWeight').textContent = current ? current.value.toFixed(1) : '--';
      if (sorted.length >= 2) {
        const delta = current.value - sorted[0].value;
        const arrow = delta < 0 ? '⬇' : delta > 0 ? '⬆' : '→';
        document.getElementById('weightDeltaLabel').textContent = `${Math.abs(delta).toFixed(1)} ק״ג מהשבוע שעבר ${arrow}`;
      } else {
        document.getElementById('weightDeltaLabel').textContent = 'אין מספיק נתונים';
      }
      const svg = document.getElementById('weightChart');
      if (!sorted.length) { svg.innerHTML = ''; return; }
      const values = sorted.map(x => x.value);
      const min = Math.min(...values) - .6;
      const max = Math.max(...values) + .6;
      const w = 360, h = 220, left = 18, right = 18, top = 14, bottom = 34;
      const usableW = w - left - right;
      const usableH = h - top - bottom;
      const points = sorted.map((item, i) => {
        const x = left + i * (usableW / Math.max(1, sorted.length - 1));
        const y = top + (1 - ((item.value - min) / (max - min || 1))) * usableH;
        return { x, y, label: item.date.slice(5) };
      });
      const line = points.map(p => `${p.x},${p.y}`).join(' ');
      const area = `${left},${h-bottom} ${line} ${left + usableW},${h-bottom}`;
      svg.innerHTML = `
        <defs>
          <linearGradient id="weightFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(54,211,154,.35)" />
            <stop offset="100%" stop-color="rgba(54,211,154,0)" />
          </linearGradient>
        </defs>
        <line x1="${left}" y1="${h-bottom}" x2="${w-right}" y2="${h-bottom}" stroke="rgba(255,255,255,.08)" />
        <polygon points="${area}" fill="url(#weightFill)" />
        <polyline points="${line}" fill="none" stroke="#36d39a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        ${points.map(p => `<circle cx="${p.x}" cy="${p.y}" r="4.2" fill="#081018" stroke="#36d39a" stroke-width="2" />`).join('')}
        ${points.map(p => `<text x="${p.x}" y="${h-10}" fill="#9ba8c7" font-size="11" text-anchor="middle">${p.label}</text>`).join('')}
      `;
    }

    function renderDate() {
      document.getElementById('dateLabel').textContent = formatDisplayDate(state.currentDate);
    }

    function renderMealSelect(defaultMealKey) {
      const select = document.getElementById('mealSelect');
      select.innerHTML = MEALS.map(meal => `<option value="${meal.key}">${meal.name}</option>`).join('');
      if (defaultMealKey) select.value = defaultMealKey;
    }

    function renderUnitOptions(foodId) {
      const select = document.getElementById('unitSelect');
      if (!foodId) {
        select.innerHTML = '<option value="gram">גרם</option>';
        return;
      }
      const food = getFoodById(foodId);
      select.innerHTML = Object.keys(food.units).map(key => `<option value="${key}">${UNIT_LABELS[key] || key}</option>`).join('');
    }

    function renderAutocomplete(query='') {
      const box = document.getElementById('autocompleteList');
      const q = query.trim();
      if (!q) { box.innerHTML = ''; return; }
      const matches = FOOD_DB.filter(food => food.name.includes(q)).slice(0, 6);
      box.innerHTML = matches.map(food => `
        <div class="autocomplete-item" onclick="selectFood('${food.id}')">
          <strong>${escapeHtml(food.name)}</strong>
          <span>${Object.keys(food.units).map(u => UNIT_LABELS[u]).join(' • ')}</span>
        </div>
      `).join('') || '<div class="empty">לא נמצאו התאמות</div>';
    }

    function render() {
      renderDate();
      renderSummary();
      renderMeals();
      renderWeight();
      save();
    }

    function toggleMeal(key) {
      state.mealOpen[key] = !state.mealOpen[key];
      renderMeals();
      save();
    }

    function openFoodSheet(mealKey='breakfast') {
      renderMealSelect(mealKey);
      selectedFoodId = '';
      document.getElementById('foodSearchInput').value = '';
      document.getElementById('amountInput').value = '';
      renderUnitOptions('');
      renderAutocomplete('');
      document.getElementById('sheetBackdrop').classList.add('open');
      document.getElementById('foodSheet').classList.add('open');
      document.getElementById('weightSheet').classList.remove('open');
    }

    function openWeightSheet() {
      document.getElementById('sheetBackdrop').classList.add('open');
      document.getElementById('weightSheet').classList.add('open');
      document.getElementById('foodSheet').classList.remove('open');
    }

    function closeSheets() {
      document.getElementById('sheetBackdrop').classList.remove('open');
      document.querySelectorAll('.sheet').forEach(el => el.classList.remove('open'));
    }

    function selectFood(foodId) {
      selectedFoodId = foodId;
      const food = getFoodById(foodId);
      document.getElementById('foodSearchInput').value = food.name;
      renderUnitOptions(foodId);
      document.getElementById('autocompleteList').innerHTML = '';
    }

    function addFood() {
      const mealKey = document.getElementById('mealSelect').value;
      const amount = Number(document.getElementById('amountInput').value || 0);
      const unit = document.getElementById('unitSelect').value;
      const typed = document.getElementById('foodSearchInput').value.trim();
      if (!selectedFoodId) {
        const exact = FOOD_DB.find(f => f.name === typed);
        if (exact) selectedFoodId = exact.id;
      }
      if (!selectedFoodId || amount <= 0) {
        alert('בחר מזון והזן כמות תקינה');
        return;
      }
      state.foods.push({ id: uid(), date: state.currentDate, mealKey, foodId: selectedFoodId, amount, unit });
      closeSheets();
      render();
    }

    function removeFood(id) {
      state.foods = state.foods.filter(f => f.id !== id);
      render();
    }

    function addWeight() {
      const value = Number(document.getElementById('weightInput').value || 0);
      if (value <= 0) {
        alert('יש להזין משקל תקין');
        return;
      }
      state.weights = state.weights.filter(w => w.date !== state.currentDate);
      state.weights.push({ date: state.currentDate, value });
      document.getElementById('weightInput').value = '';
      closeSheets();
      render();
    }

    function changeDate(days) {
      const d = parseDate(state.currentDate);
      d.setDate(d.getDate() + days);
      state.currentDate = dateKey(d);
      render();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    document.getElementById('foodSearchInput').addEventListener('input', e => {
      const value = e.target.value;
      selectedFoodId = '';
      renderAutocomplete(value);
    });
    document.getElementById('addFoodBtn').addEventListener('click', addFood);
    document.getElementById('addWeightBtn').addEventListener('click', addWeight);
    document.getElementById('sheetBackdrop').addEventListener('click', closeSheets);
    document.getElementById('openWeightSheetBtn').addEventListener('click', openWeightSheet);
    document.getElementById('openWeightSheetTopBtn').addEventListener('click', openWeightSheet);
    document.getElementById('prevDateBtn').addEventListener('click', () => changeDate(-1));
    document.getElementById('nextDateBtn').addEventListener('click', () => changeDate(1));
    document.getElementById('backBtn').addEventListener('click', () => { window.location.href = 'index.html'; });
    document.getElementById('navWorkoutBtn').addEventListener('click', () => { window.location.href = 'index.html'; });
    document.getElementById('navProfileBtn').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    document.getElementById('navReportsBtn').addEventListener('click', () => document.getElementById('weightChart').scrollIntoView({ behavior: 'smooth', block: 'center' }));

    window.toggleMeal = toggleMeal;
    window.openFoodSheet = openFoodSheet;
    window.removeFood = removeFood;
    window.selectFood = selectFood;

    render();
  </script>
</body>
</html>
