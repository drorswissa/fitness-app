<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutrition</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1017;
  color:white;
  max-width:430px;
  margin:auto;
  padding:15px;
}

.card {
  background:#111827;
  border-radius:20px;
  padding:15px;
  margin-bottom:10px;
}

.title {
  font-size:22px;
  font-weight:bold;
  text-align:center;
  margin-bottom:10px;
}

.row {
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:15px;
  background:#2bd3a0;
  font-weight:bold;
  margin-top:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:none;
  background:#1f2937;
  color:white;
}
</style>
</head>

<body>

<div class="card">
  <div class="title">מעקב תזונה</div>
</div>

<div class="card">
  <div class="row"><span>קלוריות</span><span id="cal">0</span></div>
  <div class="row"><span>חלבון</span><span id="pro">0</span></div>
  <div class="row"><span>פחמימות</span><span id="carb">0</span></div>
  <div class="row"><span>שומן</span><span id="fat">0</span></div>
</div>

<div class="card">
  <div class="title">הוסף מזון</div>
  <input id="name" placeholder="שם מזון">
  <input id="calInput" placeholder="קלוריות">
  <input id="proInput" placeholder="חלבון">
  <input id="carbInput" placeholder="פחמימות">
  <input id="fatInput" placeholder="שומן">
  <button onclick="addFood()">הוסף</button>
</div>

<div class="card">
  <div class="title">יומן</div>
  <div id="list"></div>
</div>

<button onclick="goBack()">חזרה לאימונים</button>

<script>
let data = JSON.parse(localStorage.getItem("food")) || [];

function addFood(){
  const item = {
    name: name.value,
    cal: +calInput.value,
    pro: +proInput.value,
    carb: +carbInput.value,
    fat: +fatInput.value
  };

  data.push(item);
  localStorage.setItem("food", JSON.stringify(data));
  render();
}

function render(){
  let c=0,p=0,car=0,f=0;

  list.innerHTML = data.map(x=>{
    c+=x.cal;
    p+=x.pro;
    car+=x.carb;
    f+=x.fat;
    return `<div>${x.name}</div>`;
  }).join("");

  cal.innerText=c;
  pro.innerText=p;
  carb.innerText=car;
  fat.innerText=f;
}

function goBack(){
  window.location.href="index.html";
}

render();
</script>

</body>
</html>
