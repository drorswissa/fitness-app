<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout App V2 Clean</title>
  <style>
    :root {
      --bg: #0b1017;
      --panel: #111827;
      --panel-2: #162033;
      --panel-3: #0c1320;
      --text: #f5f7fb;
      --muted: #9eabc3;
      --line: rgba(255,255,255,0.08);
      --accent: #2bd3a0;
      --accent-2: #1eb885;
      --danger: #ff6f6f;
      --shadow: 0 10px 28px rgba(0,0,0,.25);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #08101a 0%, #0b1017 100%);
      color: var(--text);
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 12px 12px 110px;
    }

    .stack { display: grid; gap: 12px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .mini-btn {
      min-width: 38px;
      height: 38px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
    }

    .screen-timer {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      flex: 1;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .day-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 10px;
      text-align: center;
      cursor: pointer;
      color: var(--text);
      font-weight: 700;
    }

    .day-card small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-weight: 400;
      font-size: 11px;
    }

    .day-card.active {
      outline: 2px solid rgba(43,211,160,.35);
      background: rgba(43,211,160,.10);
    }

    .progress-track {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
    }

    .progress-step {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 999px;
      background: #000;
      border: 1px solid var(--line);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      opacity: .9;
      cursor: pointer;
    }

    .progress-step.active {
      background: var(--accent);
      color: #052017;
    }

    .hero-image {
      width: 100%;
      height: 176px;
      object-fit: contain;
      border-radius: 16px;
      background: #fff;
      border: 1px solid var(--line);
      padding: 8px;
    }

    .exercise-title {
      font-size: 18px;
      font-weight: 800;
      margin-top: 14px;
      line-height: 1.2;
    }

    .exercise-sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      margin-top: 6px;
    }

    .action-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button, input, select, a.linkbtn { font: inherit; }
    button, a.linkbtn {
      border: none;
      border-radius: 16px;
      padding: 11px 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .primary {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: #082217;
      font-weight: 800;
    }

    .secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .full { width: 100%; }

    .sets-card {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .set-row {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 12px;
      display: grid;
      grid-template-columns: 40px 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .set-row.active {
      box-shadow: inset 0 0 0 2px rgba(43,211,160,.35);
      background: rgba(43,211,160,.08);
    }

    .set-index {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2a313d;
      font-weight: 700;
      color: var(--text);
    }

    .input-wrap {
      display: grid;
      grid-template-columns: 54px auto;
      gap: 8px;
      align-items: center;
    }

    .tiny-input {
      width: 100%;
      background: #020406;
      border: 1px solid rgba(255,255,255,.05);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
    }

    .unit {
      color: var(--muted);
      font-size: 13px;
    }

    .icon-btn {
      min-width: 42px;
      height: 42px;
      border: none;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #0a0e14;
      color: var(--text);
      cursor: pointer;
      border: 1px solid var(--line);
      font-size: 16px;
    }

    .icon-btn.done {
      background: rgba(43,211,160,.16);
      color: #8ff3cb;
      border-color: rgba(43,211,160,.26);
    }

    .timer-footer {
      position: sticky;
      bottom: 92px;
      background: rgba(20,26,35,.96);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      box-shadow: var(--shadow);
      margin-top: 14px;
      z-index: 4;
    }

    .footer-block { text-align: center; }
    .footer-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .footer-time { font-size: 20px; font-weight: 800; }

    .footer-btn {
      border: none;
      border-radius: 16px;
      padding: 14px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .footer-btn.done { background: linear-gradient(180deg, var(--accent), var(--accent-2)); color: #062117; }
    .footer-btn.rest { background: #05080d; color: #d7dfef; border: 1px solid var(--line); }

    .section.hidden { display: none; }
    .section-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-box {
      background: var(--panel-3);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      text-align: center;
    }

    .stat-box span { display: block; font-size: 12px; color: var(--muted); }
    .stat-box strong { display: block; font-size: 22px; margin-top: 4px; }

    .history-item {
      background: var(--panel-3);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 11px;
      margin-bottom: 8px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 18px 10px;
      border: 1px dashed var(--line);
      border-radius: 16px;
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: none;
      z-index: 19;
    }
    .sheet-backdrop.open { display: block; }

    .sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 82px;
      max-width: 430px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 14px;
      max-height: 62vh;
      overflow: auto;
      display: none;
      z-index: 20;
      box-shadow: var(--shadow);
    }
    .sheet.open { display: block; }

    input, select {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 13px;
      padding: 10px 11px;
      outline: none;
    }

    .library-item {
      background: var(--panel-3);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px;
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    .library-item img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 4px;
    }

    .fixed-spotify {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: min(430px, 100vw);
      background: rgba(10,14,20,.96);
      border-top: 1px solid var(--line);
      padding: 8px 10px 10px;
      z-index: 30;
      backdrop-filter: blur(10px);
    }

    .spotify-mini-label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 6px;
      text-align: center;
    }

    iframe.spotify-bar {
      width: 100%;
      height: 80px;
      border: none;
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="stack">
      <div class="card">
        <div class="topbar">
          <button class="mini-btn" id="openLibraryBtn">＋</button>
          <div class="screen-timer" id="workoutTimerDisplay">00:00</div>
          <button class="mini-btn" id="finishWorkoutTopBtn">✓</button>
        </div>

        <div class="days-grid" id="dayTabs"></div>
        <div class="progress-track" id="exerciseProgress"></div>

        <img id="activeExerciseImage" class="hero-image" alt="exercise" />
        <div class="exercise-title" id="activeExerciseName"></div>
        <div class="exercise-sub" id="activeExerciseDesc"></div>

        <div class="action-row">
          <a class="linkbtn secondary" id="youtubeLink" href="#" target="_blank" rel="noopener">יוטיוב</a>
          <a class="linkbtn secondary" id="animationLink" href="#" target="_blank" rel="noopener">אנימציה</a>
        </div>

        <div class="sets-card" id="setsList"></div>

        <div class="timer-footer">
          <button class="footer-btn rest" id="toggleWorkoutBtn">התחל אימון</button>
          <div class="footer-block">
            <div class="footer-label">Rest</div>
            <div class="footer-time" id="restTimerDisplay">00:00</div>
          </div>
          <button class="footer-btn done" id="toggleRestBtn">התחל מנוחה</button>
        </div>
      </div>

      <div class="card section" id="statsSection">
        <div class="section-title">סטטיסטיקה</div>
        <div class="stats-grid">
          <div class="stat-box"><span>אימונים</span><strong id="totalWorkouts">0</strong></div>
          <div class="stat-box"><span>תרגילים</span><strong id="totalExercises">0</strong></div>
          <div class="stat-box"><span>רצף</span><strong id="streak">0</strong></div>
        </div>
      </div>

      <div class="card section hidden" id="historySection">
        <div class="section-title">היסטוריית אימונים</div>
        <div id="historyList"></div>
      </div>

      <div class="card section hidden" id="musicSection">
        <div class="section-title">הפלייליסט שלי</div>
        <input id="spotifyInput" placeholder="הדבק קישור Spotify שלך" />
        <button class="primary full" id="saveSpotifyBtn" style="margin-top:10px;">שמור פלייליסט</button>
      </div>

      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
        <button class="secondary" id="navWorkout">אימון</button>
        <button class="secondary" id="navHistory">היסטוריה</button>
        <button class="secondary" id="navMusic">מוזיקה</button>
        <button onclick="window.location.href='nutrition.html'">תזונה</button>
      </div>
    </div>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="librarySheet">
    <div class="section-title">הוסף תרגיל</div>
    <input id="searchInput" placeholder="חפש תרגיל" />
    <select id="muscleFilter"></select>
    <select id="equipmentFilter"></select>
    <div id="libraryList"></div>
  </div>

  <div class="fixed-spotify">
    <div class="spotify-mini-label">Spotify</div>
    <iframe class="spotify-bar" id="spotifyBar" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX76Wlfdnj7AP?utm_source=generator&theme=0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
  </div>

  <script>
    const STORAGE_KEY = 'workout_app_v2_clean_new';
    let workoutTimerInterval = null;
    let restTimerInterval = null;

    const LIBRARY = [
      { id:'ex1', name:'Dumbbell Bench Press', muscle:'חזה', equipment:'משקולות', reps:'8', kg:'20', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Dumbbell-Bench-Press.gif', video:'https://www.youtube.com/results?search_query=dumbbell+bench+press' },
      { id:'ex2', name:'Machine Chest Press', muscle:'חזה', equipment:'מכונה', reps:'10', kg:'25', image:'https://fitnessprogramer.com/wp-content/uploads/2022/11/Lever-Chest-Press.gif', video:'https://www.youtube.com/results?search_query=machine+chest+press' },
      { id:'ex3', name:'Cable Fly', muscle:'חזה', equipment:'כבלים', reps:'12', kg:'15', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Cable-Crossover.gif', video:'https://www.youtube.com/results?search_query=cable+fly' },
      { id:'ex4', name:'Dumbbell Curl', muscle:'יד קדמית', equipment:'משקולות', reps:'12', kg:'10', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Dumbbell-Curl.gif', video:'https://www.youtube.com/results?search_query=dumbbell+biceps+curl' },
      { id:'ex5', name:'Hammer Curl', muscle:'יד קדמית', equipment:'משקולות', reps:'12', kg:'10', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Hammer-Curl.gif', video:'https://www.youtube.com/results?search_query=hammer+curl' },
      { id:'ex6', name:'Lat Pulldown', muscle:'גב', equipment:'מכונה', reps:'8', kg:'30', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Lat-Pulldown.gif', video:'https://www.youtube.com/results?search_query=lat+pulldown' },
      { id:'ex7', name:'Seated Cable Row', muscle:'גב', equipment:'כבלים', reps:'8', kg:'25', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Seated-Cable-Row.gif', video:'https://www.youtube.com/results?search_query=seated+cable+row' },
      { id:'ex8', name:'One Arm Dumbbell Row', muscle:'גב', equipment:'משקולות', reps:'10', kg:'18', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/One-Arm-Dumbbell-Row.gif', video:'https://www.youtube.com/results?search_query=one+arm+dumbbell+row' },
      { id:'ex9', name:'Straight Arm Pulldown', muscle:'גב', equipment:'כבלים', reps:'12', kg:'15', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Straight-Arm-Pulldown.gif', video:'https://www.youtube.com/results?search_query=straight+arm+pulldown' },
      { id:'ex10', name:'Rope Pushdown', muscle:'יד אחורית', equipment:'כבלים', reps:'12', kg:'12', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Rope-Pushdown.gif', video:'https://www.youtube.com/results?search_query=rope+triceps+pushdown' },
      { id:'ex11', name:'Overhead Extension', muscle:'יד אחורית', equipment:'כבלים', reps:'10', kg:'10', image:'https://fitnessprogramer.com/wp-content/uploads/2021/06/Cable-Overhead-Triceps-Extension.gif', video:'https://www.youtube.com/results?search_query=overhead+triceps+extension' },
      { id:'ex12', name:'Assisted Dips', muscle:'יד אחורית', equipment:'מכונה', reps:'10', kg:'סיוע', image:'https://fitnessprogramer.com/wp-content/uploads/2022/06/Assisted-Triceps-Dips.gif', video:'https://www.youtube.com/results?search_query=assisted+dips' },
      { id:'ex13', name:'Shoulder Press', muscle:'כתפיים', equipment:'מכונה', reps:'10', kg:'20', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Machine-Shoulder-Press.gif', video:'https://www.youtube.com/results?search_query=shoulder+press+machine' },
      { id:'ex14', name:'Lateral Raise', muscle:'כתפיים', equipment:'משקולות', reps:'12', kg:'8', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Dumbbell-Lateral-Raise.gif', video:'https://www.youtube.com/results?search_query=lateral+raise' },
      { id:'ex15', name:'Face Pull', muscle:'כתפיים', equipment:'כבלים', reps:'12', kg:'12', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Face-Pull.gif', video:'https://www.youtube.com/results?search_query=face+pull' },
      { id:'ex16', name:'Leg Press', muscle:'רגליים', equipment:'מכונה', reps:'12', kg:'80', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Leg-Press.gif', video:'https://www.youtube.com/results?search_query=leg+press' },
      { id:'ex17', name:'Leg Curl', muscle:'רגליים', equipment:'מכונה', reps:'12', kg:'30', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Lying-Leg-Curl.gif', video:'https://www.youtube.com/results?search_query=leg+curl' },
      { id:'ex18', name:'Goblet Squat', muscle:'רגליים', equipment:'משקולות', reps:'10', kg:'18', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Goblet-Squat.gif', video:'https://www.youtube.com/results?search_query=goblet+squat' }
    ];    function uid(){ return Date.now().toString(36); }

    function selectedDay(){
      return state.days.find(d=>d.id===state.selectedDayId);
    }

    function formatTime(sec){
      const m = Math.floor(sec/60);
      const s = sec % 60;
      return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    }

    function load(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        try{
          return JSON.parse(raw);
        }catch(e){}
      }
      return null;
    }

    function save(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    let state = load() || {
      days:[
        {id:'d1',name:'חזה + יד קדמית',label:'שלושה', exercises:[]},
        {id:'d2',name:'גב + יד אחורית',label:'רביעי', exercises:[]},
        {id:'d3',name:'כתפיים + רגליים',label:'שישי', exercises:[]},
        {id:'d4',name:'שבת',label:'אימון משולב', exercises:[]}
      ],
      selectedDayId:'d1',
      activeExerciseIndex:0,
      timers:{
        workoutSeconds:0,
        restSecondsLeft:0,
        workoutRunning:false,
        restRunning:false
      },
      history:[],
      spotifyUrl:'',
    };

    function render(){
      renderDays();
      renderExercise();
      renderStats();
      renderHistory();
      renderSpotify();
      updateTimers();
      save();
    }

    function renderDays(){
      const box = document.getElementById('dayTabs');
      box.innerHTML = state.days.map(d=>`
        <div class="day-card ${d.id===state.selectedDayId?'active':''}" onclick="selectDay('${d.id}')">
          ${d.label}
          <small>${d.name}</small>
        </div>
      `).join('');
    }

    function selectDay(id){
      state.selectedDayId = id;
      state.activeExerciseIndex = 0;
      render();
    }

    function renderExercise(){
      const day = selectedDay();
      if(!day || !day.exercises.length){
        document.getElementById('activeExerciseName').textContent = 'אין תרגילים';
        document.getElementById('activeExerciseDesc').textContent = '';
        document.getElementById('activeExerciseImage').src = '';
        document.getElementById('setsList').innerHTML = '';
        return;
      }

      const ex = day.exercises[state.activeExerciseIndex];

      document.getElementById('activeExerciseName').textContent = ex.name;
      document.getElementById('activeExerciseDesc').textContent = `${ex.muscle} • ${ex.sets.length} סטים`;
      document.getElementById('activeExerciseImage').src = ex.image;

      document.getElementById('youtubeLink').href = ex.video;
      document.getElementById('animationLink').href = ex.image;

      document.getElementById('exerciseProgress').innerHTML =
        day.exercises.map((e,i)=>`
          <div class="progress-step ${i===state.activeExerciseIndex?'active':''}" onclick="goExercise(${i})">
            ${i+1}
          </div>
        `).join('');

      document.getElementById('setsList').innerHTML =
        ex.sets.map((s,i)=>`
          <div class="set-row ${i===ex.activeSetIndex?'active':''}">
            <div class="set-index">${i+1}</div>
            <div class="input-wrap">
              <input class="tiny-input" value="${s.kg}" onchange="updateSet(${i},'kg',this.value)">
              <div class="unit">Kg</div>
            </div>
            <div class="input-wrap">
              <input class="tiny-input" value="${s.reps}" onchange="updateSet(${i},'reps',this.value)">
              <div class="unit">Reps</div>
            </div>
            <button class="icon-btn ${s.done?'done':''}" onclick="toggleSet(${i})">✓</button>
          </div>
        `).join('');
    }

    function updateSet(i,field,val){
      const ex = selectedDay().exercises[state.activeExerciseIndex];
      ex.sets[i][field] = val;
      save();
    }

    function toggleSet(i){
      const ex = selectedDay().exercises[state.activeExerciseIndex];
      ex.sets[i].done = !ex.sets[i].done;
      save();
      render();
    }

    function goExercise(i){
      state.activeExerciseIndex = i;
      render();
    }

    // 🔥 חישוב קלוריות חכם (זמן + נפח)
    function calculateWorkoutCalories(){
  let weight = 80;

  try{
    const nutrition = JSON.parse(localStorage.getItem('nutrition_final_clean_v1') || '{}');
    weight = nutrition?.profile?.weight || 80;
  }catch(e){}

  const minutes = state.timers.workoutSeconds / 60;

  let volume = 0;
  let setsCount = 0;

  selectedDay().exercises.forEach(ex=>{
    ex.sets.forEach(s=>{
      const kg = Number(s.kg) || 0;
      const reps = Number(s.reps) || 0;

      if(s.done && kg > 0 && reps > 0){
        volume += kg * reps;
        setsCount++;
      }
    });
  });

  const avgVolumePerSet = setsCount ? volume / setsCount : 0;

  let intensityFactor = 0.075;

  if(avgVolumePerSet > 700) intensityFactor = 0.105;
  else if(avgVolumePerSet > 450) intensityFactor = 0.095;
  else if(avgVolumePerSet > 250) intensityFactor = 0.085;

  const calories = minutes * weight * intensityFactor;

  return Math.round(calories);
}

    function finishWorkout(){
      const day = selectedDay();
      const completedExercises = day.exercises.filter(ex => ex.sets.some(s=>s.done)).length;

      const caloriesBurned = calculateWorkoutCalories();

      let workouts = JSON.parse(localStorage.getItem('workouts') || '[]');

      workouts.push({
        date: new Date().toISOString().slice(0,10),
        calories: caloriesBurned
      });

      localStorage.setItem('workouts', JSON.stringify(workouts));

      state.history.push({
        id: uid(),
        day: `${day.name}`,
        date: new Date().toLocaleDateString('he-IL'),
        completedExercises,
        duration: state.timers.workoutSeconds,
        calories: caloriesBurned
      });

      state.timers.workoutSeconds = 0;
      state.timers.restSecondsLeft = 0;

      clearInterval(workoutTimerInterval);
      clearInterval(restTimerInterval);

      render();

      alert(`🔥 שרפת כ-${caloriesBurned} קלוריות`);
    }

    document.getElementById('finishWorkoutTopBtn').onclick = finishWorkout;

    function updateTimers(){
      document.getElementById('workoutTimerDisplay').textContent = formatTime(state.timers.workoutSeconds);
      document.getElementById('restTimerDisplay').textContent = formatTime(state.timers.restSecondsLeft);
    }

    function renderStats(){
      document.getElementById('totalWorkouts').textContent = state.history.length;
      document.getElementById('totalExercises').textContent =
        state.history.reduce((a,b)=>a+b.completedExercises,0);
      document.getElementById('streak').textContent = state.history.length;
    }

    function renderHistory(){
      const box = document.getElementById('historyList');
      if(!state.history.length){
        box.innerHTML = '<div class="empty">אין נתונים</div>';
        return;
      }

      box.innerHTML = state.history.map(h=>`
        <div class="history-item">
          <div>${h.day}</div>
          <div>${h.date}</div>
          <div>קלוריות: ${h.calories}</div>
        </div>
      `).join('');
    }

    function renderSpotify(){
      const url = state.spotifyUrl;
      if(url){
        document.getElementById('spotifyBar').src = url;
      }
    }

    document.getElementById('saveSpotifyBtn').onclick = ()=>{
      state.spotifyUrl = document.getElementById('spotifyInput').value;
      render();
    };

    document.getElementById('navWorkout').onclick = ()=>{
      document.getElementById('statsSection').classList.remove('hidden');
      document.getElementById('historySection').classList.add('hidden');
      document.getElementById('musicSection').classList.add('hidden');
    };

    document.getElementById('navHistory').onclick = ()=>{
      document.getElementById('statsSection').classList.add('hidden');
      document.getElementById('historySection').classList.remove('hidden');
      document.getElementById('musicSection').classList.add('hidden');
    };

    document.getElementById('navMusic').onclick = ()=>{
      document.getElementById('statsSection').classList.add('hidden');
      document.getElementById('historySection').classList.add('hidden');
      document.getElementById('musicSection').classList.remove('hidden');
    };

    render();
  </script>
</body>
</html>
