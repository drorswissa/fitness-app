<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout + Nutrition App</title>
  <style>
    :root {
      --bg: #0b1017;
      --panel: #111827;
      --panel-2: #162033;
      --panel-3: #0c1320;
      --text: #f5f7fb;
      --muted: #9eabc3;
      --line: rgba(255,255,255,0.08);
      --accent: #2bd3a0;
      --accent-2: #1eb885;
      --purple: #8e61ff;
      --yellow: #f0c948;
      --orange: #ffae35;
      --danger: #ff6f6f;
      --shadow: 0 10px 28px rgba(0,0,0,.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #08101a 0%, #0b1017 100%);
      color: var(--text);
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 12px 12px 110px;
    }

    .stack { display: grid; gap: 12px; }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .mini-btn {
      min-width: 38px;
      height: 38px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
    }

    .screen-timer, .page-title {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      flex: 1;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .day-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 10px;
      text-align: center;
      cursor: pointer;
      color: var(--text);
      font-weight: 700;
    }

    .day-card small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-weight: 400;
      font-size: 11px;
    }

    .day-card.active {
      outline: 2px solid rgba(43,211,160,.35);
      background: rgba(43,211,160,.10);
    }

    .progress-track {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
    }

    .progress-step {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 999px;
      background: #000;
      border: 1px solid var(--line);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      opacity: .9;
      cursor: pointer;
    }

    .progress-step.active {
      background: var(--accent);
      color: #052017;
    }

    .hero-image {
      width: 100%;
      height: 176px;
      object-fit: contain;
      border-radius: 16px;
      background: #fff;
      border: 1px solid var(--line);
      padding: 8px;
    }

    .exercise-title {
      font-size: 18px;
      font-weight: 800;
      margin-top: 14px;
      line-height: 1.2;
    }

    .exercise-sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      margin-top: 6px;
    }

    .action-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button, input, select, a.linkbtn { font: inherit; }

    button, a.linkbtn {
      border: none;
      border-radius: 16px;
      padding: 11px 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .primary {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: #082217;
      font-weight: 800;
    }

    .secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .danger {
      background: rgba(255,111,111,.14);
      color: #ffd5d5;
      border: 1px solid rgba(255,111,111,.18);
    }

    .full { width: 100%; }

    .sets-card {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .set-row {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 12px;
      display: grid;
      grid-template-columns: 40px 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .set-row.active {
      box-shadow: inset 0 0 0 2px rgba(43,211,160,.35);
      background: rgba(43,211,160,.08);
    }

    .set-index {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2a313d;
      font-weight: 700;
      color: var(--text);
    }

    .input-wrap {
      display: grid;
      grid-template-columns: 54px auto;
      gap: 8px;
      align-items: center;
    }

    .tiny-input {
      width: 100%;
      background: #020406;
      border: 1px solid rgba(255,255,255,.05);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
    }

    .unit {
      color: var(--muted);
      font-size: 13px;
    }

    .icon-btn {
      min-width: 42px;
      height: 42px;
      border: none;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #0a0e14;
      color: var(--text);
      cursor: pointer;
      border: 1px solid var(--line);
      font-size: 16px;
    }

    .icon-btn.done {
      background: rgba(43,211,160,.16);
      color: #8ff3cb;
      border-color: rgba(43,211,160,.26);
    }

    .timer-footer {
      position: sticky;
      bottom: 92px;
      background: rgba(20,26,35,.96);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      box-shadow: var(--shadow);
      margin-top: 14px;
      z-index: 4;
    }

    .footer-block { text-align: center; }
    .footer-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .footer-time { font-size: 20px; font-weight: 800; }

    .footer-btn {
      border: none;
      border-radius: 16px;
      padding: 14px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .footer-btn.done {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: #062117;
    }

    .footer-btn.rest {
      background: #05080d;
      color: #d7dfef;
      border: 1px solid var(--line);
    }

    .section.hidden { display: none; }
    .section-title { font-size: 20px; font-weight: 800; margin-bottom: 10px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-box {
      background: var(--panel-3);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      text-align: center;
    }

    .stat-box span {
      display: block;
      font-size: 12px;
      color: var(--muted);
    }

    .stat-box strong {
      display: block;
      font-size: 22px;
      margin-top: 4px;
    }

    .history-item {
      background: var(--panel-3);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 11px;
      margin-bottom: 8px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 18px 10px;
      border: 1px dashed var(--line);
      border-radius: 16px;
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: none;
      z-index: 19;
    }

    .sheet-backdrop.open { display: block; }

    .sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 82px;
      max-width: 430px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 14px;
      max-height: 62vh;
      overflow: auto;
      display: none;
      z-index: 20;
      box-shadow: var(--shadow);
    }

    .sheet.open { display: block; }

    input, select {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 13px;
      padding: 10px 11px;
      outline: none;
      margin-bottom: 10px;
    }

    .library-item {
      background: var(--panel-3);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px;
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    .library-item img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 4px;
    }

    .fixed-spotify {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: min(430px, 100vw);
      background: rgba(10,14,20,.96);
      border-top: 1px solid var(--line);
      padding: 8px 10px 10px;
      z-index: 30;
      backdrop-filter: blur(10px);
    }

    .spotify-mini-label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 6px;
      text-align: center;
    }

    iframe.spotify-bar {
      width: 100%;
      height: 80px;
      border: none;
      border-radius: 16px;
    }

    /* Nutrition */
    .nutrition-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 8px;
    }

    .calorie-box {
      background: linear-gradient(180deg, rgba(255,174,53,.16), rgba(255,174,53,.08));
      border: 1px solid rgba(255,174,53,.2);
      border-radius: 18px;
      padding: 12px;
      min-height: 128px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .macro-box {
      border-radius: 18px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--panel-3);
    }

    .macro-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .macro-fill { height: 100%; border-radius: 999px; }
    .protein-fill { background: var(--purple); }
    .carbs-fill { background: var(--accent); }
    .fat-fill { background: var(--yellow); }

    .meal-card {
      background: var(--panel-3);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .meal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .meal-items {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .meal-item {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .meal-macros {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .weight-box {
      background: var(--panel-3);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 12px;
    }

    .weight-chart {
      width: 100%;
      height: 160px;
      display: block;
    }

    .bottom-nav-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    @media (max-width: 390px) {
      .nutrition-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: 1fr 1fr;
      }

      .set-row {
        grid-template-columns: 32px 1fr;
      }

      .input-wrap:last-of-type {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="stack">
      <!-- WORKOUT PAGE -->
      <div class="section" id="workoutPage">
        <div class="card">
          <div class="topbar">
            <button class="mini-btn" id="openLibraryBtn">＋</button>
            <div class="screen-timer" id="workoutTimerDisplay">00:00</div>
            <button class="mini-btn" id="finishWorkoutTopBtn">✓</button>
          </div>

          <div class="days-grid" id="dayTabs"></div>
          <div class="progress-track" id="exerciseProgress"></div>

          <img id="activeExerciseImage" class="hero-image" alt="exercise" />
          <div class="exercise-title" id="activeExerciseName"></div>
          <div class="exercise-sub" id="activeExerciseDesc"></div>

          <div class="action-row">
