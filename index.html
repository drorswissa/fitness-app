<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Workout App</title>
<style>
:root{--bg:#0b0f14;--bg2:#121923;--panel:#121821;--panel2:#0f141c;--line:rgba(255,255,255,.06);--text:#f5f7fb;--muted:#95a2b3;--green:#1ed760;--green2:#17c874;--danger:#ff5a67;--shadow:0 18px 40px rgba(0,0,0,.30)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);color:var(--text);font-family:Arial,sans-serif;min-height:100vh}
.hidden{display:none!important}
.app{width:min(430px,100%);margin:0 auto;min-height:100vh;padding-bottom:120px}
.topbar{position:sticky;top:0;z-index:50;padding:14px 14px 10px;background:rgba(11,15,20,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.top-shell{display:grid;grid-template-columns:1fr 56px;gap:10px;align-items:center}
.plan-box,.hero,.card,.exercise-card,.history-card,.stat-card,.editor-card{background:linear-gradient(180deg,var(--panel) 0%,var(--panel2) 100%);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
.plan-box{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;font-weight:900;font-size:18px}
.menu-btn{width:56px;height:56px;border:none;border-radius:18px;background:#070b10;color:#fff;font-size:22px;border:1px solid var(--line);cursor:pointer}
.screen{padding:14px}
.hero{padding:18px;margin-bottom:16px;background:linear-gradient(135deg,#18212d 0%,#10161f 100%)}
.hero h1{margin:0 0 6px;font-size:26px;line-height:1.05;font-weight:900}
.hero p,.small{margin:0;color:rgba(255,255,255,.86);font-size:14px;line-height:1.45}
.today-box{margin-top:12px;padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.04);font-size:14px;font-weight:900}
.actions,.editor-actions,.live-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.btn,.pill{border:none;border-radius:999px;padding:10px 14px;font-size:12px;font-weight:900;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none}
.btn-primary,.pill-primary{background:var(--green);color:#06200f}
.btn-secondary,.pill-secondary{background:#111722;color:#fff}
.btn-danger{background:#4a1c23;color:#fff}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.stat-card{padding:12px}
.stat-value{font-size:22px;font-weight:900;margin-bottom:4px}
.stat-label{font-size:12px;color:rgba(255,255,255,.72)}
.workout-list{display:grid;gap:12px}
.card{padding:16px;cursor:pointer}
.card h3,.history-card h3,.editor-card h3{margin:0 0 6px;font-size:20px;font-weight:900}
.card p,.history-card p,.editor-card p{margin:0;color:var(--muted);font-size:14px;line-height:1.4}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.section-title{margin:0;font-size:28px;font-weight:900;line-height:1.1}
.back-btn{border:none;border-radius:999px;background:#111722;color:#fff;padding:10px 14px;font-size:12px;font-weight:900;cursor:pointer}
.tabs{display:flex;gap:16px;overflow:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:14px}
.tabs::-webkit-scrollbar{display:none}
.tab{border:none;background:none;color:#758395;font-size:15px;font-weight:900;cursor:pointer;white-space:nowrap;padding:8px 0;border-bottom:2px solid transparent}
.tab.active{color:#fff;border-bottom-color:#fff}
.progress-card{padding:14px;margin-bottom:14px}
.progress-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.progress-bar{width:100%;height:10px;background:#1b2430;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--green),var(--green2));border-radius:999px;transition:width .25s ease}
.exercise-card{padding:14px}
.exercise-top{display:grid;grid-template-columns:92px 1fr;gap:14px;align-items:center}
.exercise-img{width:92px;height:92px;border-radius:20px;object-fit:cover;background:#fff;border:1px solid rgba(255,255,255,.06)}
.exercise-title{font-size:22px;font-weight:900;line-height:1.08;margin-bottom:6px}
.exercise-sub{font-size:13px;color:var(--muted);line-height:1.35}
.exercise-kicker{color:var(--green);font-size:12px;font-weight:900;margin-bottom:4px}
.timer-box{margin-top:14px;background:#0d131b;border:1px solid rgba(255,255,255,.05);border-radius:18px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.timer-label{font-size:12px;color:var(--muted);font-weight:800}
.timer-value{font-size:30px;font-weight:900;letter-spacing:1px}
.sets-box{margin-top:14px;background:#070b10;border-radius:18px;padding:12px 14px 14px}
.set-row{display:grid;grid-template-columns:20px 48px 1fr 1fr;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.set-row:last-child{border-bottom:none;padding-bottom:0}
.set-check{width:16px;height:16px;accent-color:var(--green);justify-self:center}
.set-name{font-size:13px;color:#dce5ef;font-weight:800}
.field,.input,.select,.search-input,.finder-select{background:#121a24;border-radius:12px;border:1px solid rgba(255,255,255,.04)}
.field{display:flex;align-items:center;gap:6px;padding:8px 10px}
.field input{width:100%;border
