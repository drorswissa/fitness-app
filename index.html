<!DOCTYPE html><html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout App Clean V2</title>
  <style>
    :root {
      --bg: #0b0f16;
      --panel: #121821;
      --panel-soft: #171e29;
      --panel-deep: #0f141c;
      --text: #f5f7fb;
      --muted: #9da7b8;
      --line: rgba(255,255,255,0.06);
      --accent: #20c997;
      --accent-dark: #18ad82;
      --danger: #ff7a7a;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --shadow: 0 12px 32px rgba(0,0,0,.22);
    }* { box-sizing: border-box; }
body {
  margin: 0;
  background: linear-gradient(180deg, #0a0f15 0%, #0b1017 100%);
  color: var(--text);
  font-family: Arial, Helvetica, sans-serif;
}

.app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 12px 12px 26px;
}

.stack { display: grid; gap: 12px; }

.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow);
  padding: 14px;
}

.hero {
  display: grid;
  gap: 12px;
  padding: 16px;
}

.hero-title {
  text-align: center;
  font-size: 26px;
  font-weight: 800;
  letter-spacing: .2px;
}

.hero-sub {
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.4;
}

.timer-card {
  background: var(--panel-deep);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 12px;
  display: grid;
  gap: 10px;
}

.timer-row, .row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.timer-title {
  font-size: 13px;
  color: var(--muted);
  font-weight: 700;
}

.timer-value {
  background: var(--panel-soft);
  border: 1px solid var(--line);
  padding: 7px 12px;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 700;
}

.button-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

button, input, select, a.linkbtn {
  font: inherit;
}

button, a.linkbtn {
  border: none;
  border-radius: 16px;
  padding: 11px 13px;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.primary {
  background: linear-gradient(180deg, var(--accent), var(--accent-dark));
  color: #082217;
  font-weight: 800;
}

.secondary {
  background: var(--panel-soft);
  color: var(--text);
  border: 1px solid var(--line);
}

.danger {
  background: rgba(255,122,122,.14);
  color: #ffd5d5;
  border: 1px solid rgba(255,122,122,.18);
}

.tiny {
  padding: 8px 10px;
  border-radius: 12px;
  font-size: 12px;
}

.full { width: 100%; }

.days {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.day-tab {
  background: var(--panel-soft);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 11px 10px;
  cursor: pointer;
  text-align: center;
  color: var(--text);
  font-weight: 700;
}

.day-tab small {
  display: block;
  margin-top: 4px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 400;
}

.day-tab.active {
  outline: 2px solid rgba(32,201,151,.35);
  background: rgba(32,201,151,.10);
}

.section.hidden { display: none; }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 12px;
}

.section-title {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.2;
}

.section-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}

.exercise-list {
  display: grid;
  gap: 10px;
}

.exercise-card {
  background: var(--panel-deep);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 10px;
  display: grid;
  gap: 10px;
}

.exercise-top {
  display: grid;
  grid-template-columns: 64px 1fr auto;
  gap: 10px;
  align-items: center;
}

.exercise-img {
  width: 64px;
  height: 64px;
  object-fit: cover;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: #fff;
}

.exercise-name {
  font-size: 18px;
  font-weight: 800;
  line-height: 1.15;
}

.muted {
  color: var(--muted);
  font-size: 12px;
}

.mini-chip-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.chip {
  background: var(--panel-soft);
  border: 1px solid var(--line);
  color: var(--muted);
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
}

.sets-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.set-box {
  background: #0b1017;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 10px 8px;
  text-align: center;
  color: var(--muted);
  font-size: 11px;
}

.set-box strong {
  display: block;
  color: var(--text);
  font-size: 14px;
  margin-top: 4px;
}

.edit-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

input, select {
  width: 100%;
  background: var(--panel-soft);
  color: var(--text);
  border: 1px solid var(--line);
  border-radius: 13px;
  padding: 10px 11px;
  outline: none;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.stat-box {
  background: var(--panel-deep);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 12px;
  text-align: center;
}

.stat-box span {
  display: block;
  font-size: 12px;
  color: var(--muted);
}

.stat-box strong {
  display: block;
  font-size: 22px;
  margin-top: 4px;
}

.history-item {
  background: var(--panel-deep);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 11px;
  margin-bottom: 8px;
}

.bottom-nav {
  position: sticky;
  bottom: 8px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  display: none;
  z-index: 19;
}

.sheet-backdrop.open { display: block; }

.sheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  max-width: 430px;
  margin: 0 auto;
  background: var(--panel);
  border-top: 1px solid var(--line);
  border-radius: 24px 24px 0 0;
  padding: 14px;
  max-height: 78vh;
  overflow: auto;
  display: none;
  z-index: 20;
}

.sheet.open { display: block; }

.library-item {
  background: var(--panel-deep);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 10px;
  display: grid;
  grid-template-columns: 54px 1fr auto;
  gap: 10px;
  align-items: center;
  margin-bottom: 8px;
}

.library-item img {
  width: 54px;
  height: 54px;
  object-fit: cover;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: #fff;
}

.empty {
  color: var(--muted);
  text-align: center;
  padding: 18px 10px;
  border: 1px dashed var(--line);
  border-radius: 16px;
}

iframe {
  width: 100%;
  height: 152px;
  border: none;
  border-radius: 16px;
}

  </style>
</head>

      return {
        days: [
          { id: uid(), name: 'שני', label: 'חזה + יד קדמית', exercises: [cloneExercise('ex1'), cloneExercise('ex2'), cloneExercise('ex3'), cloneExercise('ex4'), cloneExercise('ex16'), cloneExercise('ex17')] },
          { id: wedId, name: 'רביעי', label: 'גב + יד אחורית', exercises: [cloneExercise('ex5'), cloneExercise('ex6'), cloneExercise('ex7'), cloneExercise('ex8'), cloneExercise('ex11'), cloneExercise('ex12'), cloneExercise('ex13')] },
          { id: uid(), name: 'שישי', label: 'כתפיים + רגליים', exercises: [cloneExercise('ex19'), cloneExercise('ex20'), cloneExercise('ex21'), cloneExercise('ex22'), cloneExercise('ex23'), cloneExercise('ex24'), cloneExercise('ex25')] },
          { id: uid(), name: 'שבת', label: 'אימון משולב', exercises: [cloneExercise('ex2'), cloneExercise('ex6'), cloneExercise('ex20'), cloneExercise('ex22'), cloneExercise('ex16'), cloneExercise('ex26')] }
        ],
        selectedDayId: wedId,
        history: [],
        spotifyUrl: 'https://open.spotify.com/playlist/37i9dQZF1DX76Wlfdnj7AP',
        filters: { search:'', muscle:'הכל', equipment:'הכל' },
        liveTimers: { workoutSeconds: 0, workoutRunning: false, restSecondsLeft: 60, restRunning: false }
      };
    }

    function load(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        if (!parsed) return defaultState();
        parsed.days?.forEach(day => day.exercises?.forEach(ex => {
          if (typeof ex.restSeconds !== 'number') ex.restSeconds = 60;
          if (typeof ex.sets !== 'number') ex.sets = 3;
        }));
        if (!parsed.liveTimers) parsed.liveTimers = { workoutSeconds: 0, workoutRunning: false, restSecondsLeft: 60, restRunning: false };
        return parsed;
      } catch {
        return defaultState();
      }
    }

    let state = load();
    function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function selectedDay(){ return state.days.find(d => d.id === state.selectedDayId) || state.days[0]; }
    function selectDay(id){ state.selectedDayId = id; render(); }

    function formatTime(totalSeconds){
      const mins = String(Math.floor((totalSeconds || 0) / 60)).padStart(2, '0');
      const secs = String((totalSeconds || 0) % 60).padStart(2, '0');
      return `${mins}:${secs}`;
    }

    function render(){
      renderTabs();
      renderWorkout();
      renderStats();
      renderHistory();
      renderMusic();
      renderLibrary();
      renderTimers();
      save();
    }

    function renderTabs(){
      const el = document.getElementById('dayTabs');
      el.innerHTML = state.days.map(day => `<button class="day-tab ${day.id===state.selectedDayId?'active':''}" onclick="selectDay('${day.id}')">${day.name}<small>${day.label}</small></button>`).join('');
    }

    function renderWorkout(){
      const day = selectedDay();
      document.getElementById('workoutTitle').textContent = `${day.name} - ${day.label}`;
      document.getElementById('workoutNote').textContent = `${day.exercises.length} תרגילים • 3 סטים לכל תרגיל`;
      const list = document.getElementById('exerciseList');
      if(!day.exercises.length){
        list.innerHTML = '<div class="empty">אין תרגילים כרגע. הוסף מהמאגר.</div>';
        return;
      }
      list.innerHTML = day.exercises.map(ex => `
        <div class="exercise-card">
          <div class="exercise-top">
            <img class="exercise-img" src="${ex.image}" alt="${escapeHtml(ex.name)}" />
            <div>
              <div class="exercise-name">${escapeHtml(ex.name)}</div>
              <div class="muted">${escapeHtml(ex.muscle)}</div>
              <div class="muted">Rest time - ${formatTime(ex.restSeconds || 60)}</div>
            </div>
            <button class="secondary tiny" onclick="toggleDone('${day.id}','${ex.instanceId}')">${ex.done ? '✓' : '◻'}</button>
          </div>
          <div class="sets-grid">
            <div class="set-box">1 Set<strong>${escapeHtml(ex.reps)}</strong></div>
            <div class="set-box">2 Set<strong>${escapeHtml(ex.reps)}</strong></div>
            <div class="set-box">3 Set<strong>${escapeHtml(ex.reps)}</strong></div>
          </div>
          <div class="mini-chip-row">
            <span class="chip">${escapeHtml(ex.equipment)}</span>
            <span class="chip">${escapeHtml(ex.kg)}</span>
            <span class="chip">3 סטים</span>
          </div>
          <div class="edit-grid">
            <input value="${escapeHtml(ex.reps)}" onchange="updateExerciseField('${day.id}','${ex.instanceId}','reps', this.value)" placeholder="חזרות" />
            <input value="${escapeHtml(ex.kg)}" onchange="updateExerciseField('${day.id}','${ex.instanceId}','kg', this.value)" placeholder="משקל" />
            <input value="${ex.restSeconds || 60}" type="number" min="15" step="15" onchange="updateExerciseField('${day.id}','${ex.instanceId}','restSeconds', this.value)" placeholder="מנוחה" />
          </div>
          <div class="button-row">
            <a class="linkbtn secondary tiny" href="${ex.video}" target="_blank" rel="noopener">יוטיוב</a>
            <button class="secondary tiny" onclick="syncRestFromExercise('${day.id}','${ex.instanceId}')">טען מנוחה</button>
            <button class="danger tiny" onclick="removeExercise('${day.id}','${ex.instanceId}')">מחק</button>
          </div>
        </div>
      `).join('');
    }

    function updateExerciseField(dayId, instanceId, field, value){
      const ex = state.days.find(d=>d.id===dayId)?.exercises.find(e=>e.instanceId===instanceId);
      if(!ex) return;
      if(field === 'restSeconds') ex[field] = Math.max(15, Number(value || 60));
      else ex[field] = value;
      render();
    }

    function syncRestFromExercise(dayId, instanceId){
      const ex = state.days.find(d=>d.id===dayId)?.exercises.find(e=>e.instanceId===instanceId);
      if(!ex) return;
      state.liveTimers.restSecondsLeft = Number(ex.restSeconds || 60);
      pauseRestTimer();
      render();
    }

    function toggleDone(dayId, instanceId){
      const ex = state.days.find(d=>d.id===dayId)?.exercises.find(e=>e.instanceId===instanceId);
      if(!ex) return;
      ex.done = !ex.done;
      render();
    }

    function removeExercise(dayId, instanceId){
      const day = state.days.find(d=>d.id===dayId);
      if(!day) return;
      day.exercises = day.exercises.filter(e=>e.instanceId!==instanceId);
      render();
    }

    function renderTimers(){
      document.getElementById('workoutTimerDisplay').textContent = formatTime(state.liveTimers.workoutSeconds || 0);
      document.getElementById('restTimerDisplay').textContent = formatTime(state.liveTimers.restSecondsLeft || 60);
    }

    function startWorkoutTimer(){
      if (workoutTimerInterval) return;
      state.liveTimers.workoutRunning = true;
      workoutTimerInterval = setInterval(() => {
        state.liveTimers.workoutSeconds += 1;
        renderTimers();
        save();
      }, 1000);
      renderTimers();
    }

    function pauseWorkoutTimer(){
      state.liveTimers.workoutRunning = false;
      clearInterval(workoutTimerInterval);
      workoutTimerInterval = null;
      save();
      renderTimers();
    }

    function resetWorkoutTimer(){
      pauseWorkoutTimer();
      state.liveTimers.workoutSeconds = 0;
      save();
      renderTimers();
    }

    function startRestTimer(){
      if (restTimerInterval) return;
      state.liveTimers.restRunning = true;
      restTimerInterval = setInterval(() => {
        if ((state.liveTimers.restSecondsLeft || 0) > 0) {
          state.liveTimers.restSecondsLeft -= 1;
        } else {
          pauseRestTimer();
          alert('זמן המנוחה הסתיים');
        }
        renderTimers();
        save();
      }, 1000);
      renderTimers();
    }

    function pauseRestTimer(){
      state.liveTimers.restRunning = false;
      clearInterval(restTimerInterval);
      restTimerInterval = null;
      save();
      renderTimers();
    }

    function resetRestTimer(){
      pauseRestTimer();
      state.liveTimers.restSecondsLeft = 60;
      save();
      renderTimers();
    }

    function finishWorkout(){
      const day = selectedDay();
      state.history.push({
        id: uid(),
        day: `${day.name} - ${day.label}`,
        date: new Date().toLocaleDateString('he-IL'),
        completed: day.exercises.filter(x=>x.done).length,
        total: day.exercises.length,
        duration: state.liveTimers.workoutSeconds || 0
      });
      day.exercises.forEach(x=>x.done=false);
      resetWorkoutTimer();
      render();
      alert('האימון נשמר בהיסטוריה');
    }

    function renderStats(){
      document.getElementById('totalWorkouts').textContent = state.history.length;
      document.getElementById('totalExercises').textContent = state.history.reduce((s,x)=>s+x.completed,0);
      document.getElementById('streak').textContent = calcStreak();
    }

    function calcStreak(){
      if(!state.history.length) return 0;
      return [...new Set(state.history.map(x=>x.date))].length;
    }

    function renderHistory(){
      const el = document.getElementById('historyList');
      if(!state.history.length){
        el.innerHTML = '<div class="empty">עדיין אין היסטוריה</div>';
        return;
      }
      el.innerHTML = state.history.slice().reverse().map(item => `
        <div class="history-item">
          <div class="row">
            <strong>${escapeHtml(item.day)}</strong>
            <span class="chip">${escapeHtml(item.date)}</span>
          </div>
          <div class="muted" style="margin-top:8px;">${item.completed}/${item.total} תרגילים בוצעו • זמן אימון ${formatTime(item.duration || 0)}</div>
        </div>
      `).join('');
    }

    function renderMusic(){
      document.getElementById('spotifyInput').value = state.spotifyUrl || '';
      document.getElementById('spotifyEmbed').src = embedUrl(state.spotifyUrl);
    }

    function embedUrl(url){
      const fallback = 'https://open.spotify.com/embed/playlist/37i9dQZF1DX76Wlfdnj7AP?utm_source=generator';
      const m = url && url.match(/open\.spotify\.com\/(playlist|album|track)\/([A-Za-z0-9]+)/);
      return m ? `https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator` : fallback;
    }

    function saveSpotify(){
      const value = document.getElementById('spotifyInput').value.trim();
      if(!value.includes('spotify.com')) return alert('הדבק קישור Spotify תקין');
      state.spotifyUrl = value;
      render();
    }

    function renderLibrary(){
      const muscles = ['הכל', ...new Set(LIBRARY.map(x=>x.muscle))];
      const equipments = ['הכל', ...new Set(LIBRARY.map(x=>x.equipment))];
      document.getElementById('muscleFilter').innerHTML = muscles.map(x=>`<option value="${x}">${x}</option>`).join('');
      document.getElementById('equipmentFilter').innerHTML = equipments.map(x=>`<option value="${x}">${x}</option>`).join('');
      document.getElementById('muscleFilter').value = state.filters.muscle;
      document.getElementById('equipmentFilter').value = state.filters.equipment;

      let items = [...LIBRARY];
      const q = state.filters.search.trim().toLowerCase();
      if(q) items = items.filter(x => `${x.name} ${x.muscle} ${x.equipment}`.toLowerCase().includes(q));
      if(state.filters.muscle !== 'הכל') items = items.filter(x => x.muscle === state.filters.muscle);
      if(state.filters.equipment !== 'הכל') items = items.filter(x => x.equipment === state.filters.equipment);

      const box = document.getElementById('libraryList');
      box.innerHTML = items.map(item => `
        <div class="library-item">
          <img src="${item.image}" alt="${escapeHtml(item.name)}" />
          <div>
            <div style="font-weight:700;">${escapeHtml(item.name)}</div>
            <div class="muted">${escapeHtml(item.muscle)} • ${escapeHtml(item.equipment)}</div>
          </div>
          <div class="button-row" style="flex-direction:column;">
            <button class="primary tiny" onclick="addExercise('${item.id}')">הוסף</button>
            <a class="linkbtn secondary tiny" href="${item.video}" target="_blank" rel="noopener">וידאו</a>
          </div>
        </div>
      `).join('') || '<div class="empty">לא נמצאו תרגילים</div>';
    }

    function addExercise(id){
      selectedDay().exercises.push(cloneExercise(id));
      closeSheet();
      render();
    }

    function openSheet(){
      document.getElementById('sheetBackdrop').classList.add('open');
      document.getElementById('librarySheet').classList.add('open');
    }

    function closeSheet(){
      document.getElementById('sheetBackdrop').classList.remove('open');
      document.getElementById('librarySheet').classList.remove('open');
    }

    function showSection(name){
      document.getElementById('workoutSection').classList.toggle('hidden', name !== 'workout');
      document.getElementById('statsSection').classList.toggle('hidden', name !== 'workout');
      document.getElementById('historySection').classList.toggle('hidden', name !== 'history');
      document.getElementById('musicSection').classList.toggle('hidden', name !== 'music');
    }

    function resetHistory(){
      if(!confirm('לאפס היסטוריה וסטטיסטיקה?')) return;
      state.history = [];
      render();
    }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/\"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    document.getElementById('finishWorkoutBtn').addEventListener('click', finishWorkout);
    document.getElementById('openLibraryBtn').addEventListener('click', openSheet);
    document.getElementById('closeSheetBtn').addEventListener('click', closeSheet);
    document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);
    document.getElementById('saveSpotifyBtn').addEventListener('click', saveSpotify);
    document.getElementById('navWorkout').addEventListener('click', ()=>showSection('workout'));
    document.getElementById('navHistory').addEventListener('click', ()=>showSection('history'));
    document.getElementById('navMusic').addEventListener('click', ()=>showSection('music'));
    document.getElementById('resetHistoryBtn').addEventListener('click', resetHistory);
    document.getElementById('searchInput').addEventListener('input', e=>{ state.filters.search=e.target.value; renderLibrary(); save(); });
    document.getElementById('muscleFilter').addEventListener('change', e=>{ state.filters.muscle=e.target.value; renderLibrary(); save(); });
    document.getElementById('equipmentFilter').addEventListener('change', e=>{ state.filters.equipment=e.target.value; renderLibrary(); save(); });
    document.getElementById('startWorkoutTimerBtn').addEventListener('click', startWorkoutTimer);
    document.getElementById('pauseWorkoutTimerBtn').addEventListener('click', pauseWorkoutTimer);
    document.getElementById('resetWorkoutTimerBtn').addEventListener('click', resetWorkoutTimer);
    document.getElementById('startRestTimerBtn').addEventListener('click', startRestTimer);
    document.getElementById('pauseRestTimerBtn').addEventListener('click', pauseRestTimer);
    document.getElementById('resetRestTimerBtn').addEventListener('click', resetRestTimer);

    window.selectDay = selectDay;
    window.toggleDone = toggleDone;
    window.removeExercise = removeExercise;
    window.addExercise = addExercise;
    window.updateExerciseField = updateExerciseField;
    window.syncRestFromExercise = syncRestFromExercise;

    showSection('workout');
    render();
    if (state.liveTimers?.workoutRunning) startWorkoutTimer();
    if (state.liveTimers?.restRunning) startRestTimer();
  </script></body>
</html>
