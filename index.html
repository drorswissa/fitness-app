<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout App</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:#fff;
}

.container{
max-width:430px;
margin:auto;
padding:15px;
}

.header{
background:#121821;
padding:15px;
border-radius:16px;
text-align:center;
font-weight:bold;
font-size:20px;
}

.hero{
margin-top:15px;
background:#121821;
padding:15px;
border-radius:16px;
text-align:center;
}

.btn{
background:#1ed760;
border:none;
padding:12px;
border-radius:999px;
font-weight:bold;
margin-top:10px;
width:100%;
}

.card{
background:#121821;
margin-top:12px;
padding:15px;
border-radius:16px;
cursor:pointer;
}

.exercise{
background:#111722;
padding:12px;
border-radius:16px;
margin-top:10px;
}

.timer{
font-size:28px;
text-align:center;
margin-top:10px;
}

input{
width:60px;
background:#0b0f14;
color:#fff;
border:none;
text-align:center;
}

img{
width:100%;
border-radius:12px;
margin-top:10px;
}

.hidden{
display:none;
}

.spotify{
margin-top:15px;
border-radius:16px;
overflow:hidden;
}
</style>
</head>

<body>

<div class="container">

<div id="home">

<div class="header">My Workout Plan</div>

<div class="hero">
<h2>Your Workout</h2>
<button class="btn" onclick="startToday()">Start Today Workout</button>
</div>

<div class="spotify">
<iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DX76Wlfdnj7AP"
width="100%" height="80" frameborder="0"></iframe>
</div>

<div id="workouts"></div>

</div>

<div id="workoutPage" class="hidden">

<div class="header" id="title"></div>

<div id="exerciseArea"></div>

<button class="btn" onclick="nextExercise()">Next Exercise</button>

</div>

</div>

<script>

let workouts={
monday:{title:"שני - חזה + יד קדמית",ex:[
{name:"Bench Press",img:"https://img.youtube.com/vi/rT7DgCr-3pg/hqdefault.jpg"},
{name:"Incline DB Press",img:"https://img.youtube.com/vi/8iPEnn-ltC8/hqdefault.jpg"},
{name:"Cable Fly",img:"https://img.youtube.com/vi/eozdVDA78K0/hqdefault.jpg"},
{name:"Curl",img:"https://img.youtube.com/vi/ykJmrZ5v0Oo/hqdefault.jpg"},
{name:"Hammer Curl",img:"https://img.youtube.com/vi/zC3nLlEvin4/hqdefault.jpg"},
{name:"Cable Curl",img:"https://img.youtube.com/vi/NFzTWp2qpiE/hqdefault.jpg"}
]},

wednesday:{title:"רביעי - גב + יד אחורית",ex:[
{name:"Lat Pulldown",img:"https://img.youtube.com/vi/SALxEARiMkw/hqdefault.jpg"},
{name:"Row",img:"https://img.youtube.com/vi/GZbfZ033f74/hqdefault.jpg"},
{name:"Deadlift",img:"https://img.youtube.com/vi/op9kVnSso6Q/hqdefault.jpg"},
{name:"Pushdown",img:"https://img.youtube.com/vi/vB5OHsJ3EME/hqdefault.jpg"},
{name:"Extension",img:"https://img.youtube.com/vi/tmgfpdpQ5sk/hqdefault.jpg"},
{name:"Dip",img:"https://img.youtube.com/vi/2z8JmcrW-As/hqdefault.jpg"}
]},

friday:{title:"שישי - כתפיים + רגליים",ex:[
{name:"Shoulder Press",img:"https://img.youtube.com/vi/qEwKCR5JCog/hqdefault.jpg"},
{name:"Arnold Press",img:"https://img.youtube.com/vi/6Z15_WdXmVw/hqdefault.jpg"},
{name:"Lateral Raise",img:"https://img.youtube.com/vi/3VcKaXpzqRo/hqdefault.jpg"},
{name:"Squat",img:"https://img.youtube.com/vi/xqvCmoLULNY/hqdefault.jpg"},
{name:"Lunge",img:"https://img.youtube.com/vi/L8fvypPrzzs/hqdefault.jpg"},
{name:"Leg Press",img:"https://img.youtube.com/vi/Aq5uxXrXq7c/hqdefault.jpg"}
]},

saturday:{title:"שבת - אימון משולב",ex:[
{name:"Bench",img:"https://img.youtube.com/vi/rT7DgCr-3pg/hqdefault.jpg"},
{name:"Row",img:"https://img.youtube.com/vi/GZbfZ033f74/hqdefault.jpg"},
{name:"Shoulder",img:"https://img.youtube.com/vi/qEwKCR5JCog/hqdefault.jpg"},
{name:"Curl",img:"https://img.youtube.com/vi/ykJmrZ5v0Oo/hqdefault.jpg"},
{name:"Pushdown",img:"https://img.youtube.com/vi/vB5OHsJ3EME/hqdefault.jpg"},
{name:"Squat",img:"https://img.youtube.com/vi/xqvCmoLULNY/hqdefault.jpg"}
]}
};

let currentWorkout=null;
let index=0;
let timer=0;
let interval;

function render(){
let html="";
Object.keys(workouts).forEach(k=>{
html+=`<div class="card" onclick="openWorkout('${k}')">
${workouts[k].title}
</div>`;
});
document.getElementById("workouts").innerHTML=html;
}

function startToday(){
let d=new Date().getDay();
let map={1:"monday",3:"wednesday",5:"friday",6:"saturday"};
openWorkout(map[d]||"monday");
}

function openWorkout(k){
currentWorkout=workouts[k];
index=0;
document.getElementById("home").classList.add("hidden");
document.getElementById("workoutPage").classList.remove("hidden");
document.getElementById("title").innerText=currentWorkout.title;
renderExercise();
}

function renderExercise(){
let ex=currentWorkout.ex[index];

document.getElementById("exerciseArea").innerHTML=`
<div class="exercise">
<h3>${ex.name}</h3>
<img src="${ex.img}">
<div class="timer" id="timer">00:00</div>

<div>
Reps <input type="number" value="8">
Weight <input type="number" value="20">
</div>

<button class="btn" onclick="startSet()">Start Set</button>
<button class="btn" onclick="startRest()">Rest</button>

</div>
`;
}

function startSet(){
clearInterval(interval);
timer=0;
interval=setInterval(()=>{
timer++;
updateTimer();
},1000);
}

function startRest(){
clearInterval(interval);
timer=60;
interval=setInterval(()=>{
timer--;
updateTimer();
if(timer<=0){
clearInterval(interval);
speak("REST IS DONE");
nextExercise();
}
},1000);
}

function updateTimer(){
let m=Math.floor(timer/60).toString().padStart(2,"0");
let s=(timer%60).toString().padStart(2,"0");
document.getElementById("timer").innerText=m+":"+s;
}

function nextExercise(){
if(index<currentWorkout.ex.length-1){
index++;
renderExercise();
}
}

function speak(text){
let msg=new SpeechSynthesisUtterance(text);
msg.lang="en-US";
speechSynthesis.speak(msg);
}

render();

</script>

</body>
</html>
