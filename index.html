<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout App Fixed V2</title>
  <style>
    :root {
      --bg: #0b0f16;
      --panel: #141a23;
      --panel-2: #1a212d;
      --panel-3: #0f141c;
      --text: #f3f6fb;
      --muted: #98a4b8;
      --line: rgba(255,255,255,0.06);
      --accent: #22c58b;
      --accent-2: #18a875;
      --danger: #ff6f6f;
      --shadow: 0 10px 26px rgba(0,0,0,.24);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #090d14 0%, #0b1017 100%);
      color: var(--text);
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 12px 12px 110px;
    }
    .stack { display: grid; gap: 12px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .mini-btn {
      min-width: 38px;
      height: 38px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
    }
    .screen-timer {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      flex: 1;
    }
    .days-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .day-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 10px;
      text-align: center;
      cursor: pointer;
      color: var(--text);
      font-weight: 700;
    }
    .day-card small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-weight: 400;
      font-size: 11px;
    }
    .day-card.active {
      outline: 2px solid rgba(34,197,139,.35);
      background: rgba(34,197,139,.10);
    }
    .progress-track {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
    }
    .progress-step {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 999px;
      background: #000;
      border: 1px solid var(--line);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      opacity: .88;
      cursor: pointer;
    }
    .progress-step.active {
      background: var(--accent);
      color: #062117;
      opacity: 1;
    }
    .hero-image {
      width: 100%;
      height: 176px;
      object-fit: contain;
      border-radius: 16px;
      background: #fff;
      border: 1px solid var(--line);
      padding: 8px;
    }
    .exercise-title {
      font-size: 18px;
      font-weight: 800;
      margin-top: 14px;
      line-height: 1.2;
    }
    .exercise-sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      margin-top: 6px;
    }
    .action-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    button, input, select, a.linkbtn {
      font: inherit;
    }
    button, a.linkbtn {
      border: none;
      border-radius: 16px;
      padding: 11px 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .primary {
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: #082217;
      font-weight: 800;
    }
    .secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
    }
    .danger {
      background: rgba(255,111,111,.14);
      color: #ffd5d5;
      border: 1px solid rgba(255,111,111,.18);
    }
    .full { width: 100%; }
    .sets-card {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }
    .set-row {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 12px;
      display: grid;
      grid-template-columns: 40px 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .set-row.active {
      box-shadow: inset 0 0 0 2px rgba(34,197,139,.35);
      background: rgba(34,197,139,.08);
    }
    .set-index {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2a313d;
      font-weight: 700;
      color: var(--text);
    }
    .input-wrap {
      display: grid;
      grid-template-columns: 54px auto;
      gap: 8px;
      align-items: center;
    }
    .tiny-input {
      width: 100%;
      background: #020406;
      border: 1px solid rgba(255,255,255,.05);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
    }
    .unit {
      color: var(--muted);
      font-size: 13px;
    }
    .icon-btn {
      min-width: 42px;
      height: 42px;
      border: none;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #0a0e14;
      color: var(--text);
      cursor: pointer;
      border: 1px solid var(--line);
      font-size: 16px;
    }
    .icon-btn.done {
      background: rgba(34,197,139,.16);
      color: #8ff3cb;
      border-color: rgba(34,197,139,.26);
    }
    .timer-footer {
      position: sticky;
      bottom: 92px;
      background: rgba(20,26,35,.96);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      box-shadow: var(--shadow);
      margin-top: 14px;
      z-index: 4;
    }
    .footer-block { text-align: center; }
    .footer-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .footer-time { font-size: 20px; font-weight: 800; }
    .footer-btn {
      border: none;
      border-radius: 16px;
      padding: 14px 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .footer-btn.done { background: linear-gradient(180deg, var(--accent), var(--accent-2)); color: #062117; }
    .footer-btn.rest { background: #05080d; color: #d7dfef; border: 1px solid var(--line); }
    .section.hidden { display: none; }
    .section-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .stat-box {
      background: var(--panel-3);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px;
      text-align: center;
    }
    .stat-box span { display: block; font-size: 12px; color: var(--muted); }
    .stat-box strong { display: block; font-size: 22px; margin-top: 4px; }
    .history-item {
      background: var(--panel-3);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 11px;
      margin-bottom: 8px;
    }
    .empty {
      color: var(--muted);
      text-align: center;
      padding: 18px 10px;
      border: 1px dashed var(--line);
      border-radius: 16px;
    }
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: none;
      z-index: 19;
    }
    .sheet-backdrop.open { display: block; }
    .sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 82px;
      max-width: 430px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 14px;
      max-height: 62vh;
      overflow: auto;
      display: none;
      z-index: 20;
      box-shadow: var(--shadow);
    }
    .sheet.open { display: block; }
    input, select {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 13px;
      padding: 10px 11px;
      outline: none;
    }
    .library-item {
      background: var(--panel-3);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 10px;
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }
    .library-item img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 4px;
    }
    .fixed-spotify {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: min(430px, 100vw);
      background: rgba(10,14,20,.96);
      border-top: 1px solid var(--line);
      padding: 8px 10px 10px;
      z-index: 30;
      backdrop-filter: blur(10px);
    }
    .spotify-mini-label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 6px;
      text-align: center;
    }
    iframe.spotify-bar {
      width: 100%;
      height: 80px;
      border: none;
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="stack">
      <div class="card">
        <div class="topbar">
          <button class="mini-btn" id="openLibraryBtn">＋</button>
          <div class="screen-timer" id="workoutTimerDisplay">00:00</div>
          <button class="mini-btn" id="finishWorkoutTopBtn">✓</button>
        </div>

        <div class="days-grid" id="dayTabs"></div>
        <div class="progress-track" id="exerciseProgress"></div>

        <img id="activeExerciseImage" class="hero-image" alt="exercise" />
        <div class="exercise-title" id="activeExerciseName"></div>
        <div class="exercise-sub" id="activeExerciseDesc"></div>

        <div class="action-row">
          <a class="linkbtn secondary" id="youtubeLink" href="#" target="_blank" rel="noopener">יוטיוב</a>
          <a class="linkbtn secondary" id="animationLink" href="#" target="_blank" rel="noopener">אנימציה</a>
        </div>

        <div class="sets-card" id="setsList"></div>

        <div class="timer-footer">
          <button class="footer-btn rest" id="toggleWorkoutBtn">התחל אימון</button>
          <div class="footer-block">
            <div class="footer-label">Rest</div>
            <div class="footer-time" id="restTimerDisplay">01:00</div>
          </div>
          <button class="footer-btn done" id="toggleRestBtn">התחל מנוחה</button>
        </div>
      </div>

      <div class="card section" id="statsSection">
        <div class="section-title">סטטיסטיקה</div>
        <div class="stats-grid">
          <div class="stat-box"><span>אימונים</span><strong id="totalWorkouts">0</strong></div>
          <div class="stat-box"><span>תרגילים</span><strong id="totalExercises">0</strong></div>
          <div class="stat-box"><span>רצף</span><strong id="streak">0</strong></div>
        </div>
      </div>

      <div class="card section hidden" id="historySection">
        <div class="section-title">היסטוריית אימונים</div>
        <div id="historyList"></div>
      </div>

      <div class="card section hidden" id="musicSection">
        <div class="section-title">הפלייליסט שלי</div>
        <input id="spotifyInput" placeholder="הדבק קישור Spotify שלך" />
        <button class="primary full" id="saveSpotifyBtn" style="margin-top:10px;">שמור פלייליסט</button>
      </div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
        <button class="secondary" id="navWorkout">אימון</button>
        <button class="secondary" id="navHistory">היסטוריה</button>
        <button class="secondary" id="navMusic">מוזיקה</button>
      </div>
    </div>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="librarySheet">
    <div class="section-title">הוסף תרגיל</div>
    <input id="searchInput" placeholder="חפש תרגיל" />
    <select id="muscleFilter"></select>
    <select id="equipmentFilter"></select>
    <div id="libraryList"></div>
  </div>

  <div class="fixed-spotify">
    <div class="spotify-mini-label">Spotify</div>
    <iframe class="spotify-bar" id="spotifyBar" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX76Wlfdnj7AP?utm_source=generator&theme=0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
  </div>

  <script>
    const STORAGE_KEY = 'workout_app_v2_fixed_days';
    let workoutTimerInterval = null;
    let restTimerInterval = null;

    const LIBRARY = [
      { id:'ex1', name:'Dumbbell Bench Press', muscle:'חזה', equipment:'משקולות', reps:'8', kg:'20', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Dumbbell-Bench-Press.gif', video:'https://www.youtube.com/results?search_query=dumbbell+bench+press' },
      { id:'ex2', name:'Machine Chest Press', muscle:'חזה', equipment:'מכונה', reps:'10', kg:'25', image:'https://fitnessprogramer.com/wp-content/uploads/2022/11/Lever-Chest-Press.gif', video:'https://www.youtube.com/results?search_query=machine+chest+press' },
      { id:'ex3', name:'Cable Fly', muscle:'חזה', equipment:'כבלים', reps:'12', kg:'15', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Cable-Crossover.gif', video:'https://www.youtube.com/results?search_query=cable+fly' },
      { id:'ex4', name:'Dumbbell Curl', muscle:'יד קדמית', equipment:'משקולות', reps:'12', kg:'10', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Dumbbell-Curl.gif', video:'https://www.youtube.com/results?search_query=dumbbell+biceps+curl' },
      { id:'ex5', name:'Hammer Curl', muscle:'יד קדמית', equipment:'משקולות', reps:'12', kg:'10', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Hammer-Curl.gif', video:'https://www.youtube.com/results?search_query=hammer+curl' },
      { id:'ex6', name:'Lat Pulldown', muscle:'גב', equipment:'מכונה', reps:'8', kg:'30', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Lat-Pulldown.gif', video:'https://www.youtube.com/results?search_query=lat+pulldown' },
      { id:'ex7', name:'Seated Cable Row', muscle:'גב', equipment:'כבלים', reps:'8', kg:'25', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Seated-Cable-Row.gif', video:'https://www.youtube.com/results?search_query=seated+cable+row' },
      { id:'ex8', name:'One Arm Dumbbell Row', muscle:'גב', equipment:'משקולות', reps:'10', kg:'18', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/One-Arm-Dumbbell-Row.gif', video:'https://www.youtube.com/results?search_query=one+arm+dumbbell+row' },
      { id:'ex9', name:'Straight Arm Pulldown', muscle:'גב', equipment:'כבלים', reps:'12', kg:'15', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Straight-Arm-Pulldown.gif', video:'https://www.youtube.com/results?search_query=straight+arm+pulldown' },
      { id:'ex10', name:'Rope Pushdown', muscle:'יד אחורית', equipment:'כבלים', reps:'12', kg:'12', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Rope-Pushdown.gif', video:'https://www.youtube.com/results?search_query=rope+triceps+pushdown' },
      { id:'ex11', name:'Overhead Extension', muscle:'יד אחורית', equipment:'כבלים', reps:'10', kg:'10', image:'https://fitnessprogramer.com/wp-content/uploads/2021/06/Cable-Overhead-Triceps-Extension.gif', video:'https://www.youtube.com/results?search_query=overhead+triceps+extension' },
      { id:'ex12', name:'Assisted Dips', muscle:'יד אחורית', equipment:'מכונה', reps:'10', kg:'סיוע', image:'https://fitnessprogramer.com/wp-content/uploads/2022/06/Assisted-Triceps-Dips.gif', video:'https://www.youtube.com/results?search_query=assisted+dips' },
      { id:'ex13', name:'Shoulder Press', muscle:'כתפיים', equipment:'מכונה', reps:'10', kg:'20', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Machine-Shoulder-Press.gif', video:'https://www.youtube.com/results?search_query=shoulder+press+machine' },
      { id:'ex14', name:'Lateral Raise', muscle:'כתפיים', equipment:'משקולות', reps:'12', kg:'8', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Dumbbell-Lateral-Raise.gif', video:'https://www.youtube.com/results?search_query=lateral+raise' },
      { id:'ex15', name:'Face Pull', muscle:'כתפיים', equipment:'כבלים', reps:'12', kg:'12', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Face-Pull.gif', video:'https://www.youtube.com/results?search_query=face+pull' },
      { id:'ex16', name:'Leg Press', muscle:'רגליים', equipment:'מכונה', reps:'12', kg:'80', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Leg-Press.gif', video:'https://www.youtube.com/results?search_query=leg+press' },
      { id:'ex17', name:'Leg Curl', muscle:'רגליים', equipment:'מכונה', reps:'12', kg:'30', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Lying-Leg-Curl.gif', video:'https://www.youtube.com/results?search_query=leg+curl' },
      { id:'ex18', name:'Goblet Squat', muscle:'רגליים', equipment:'משקולות', reps:'10', kg:'18', image:'https://fitnessprogramer.com/wp-content/uploads/2021/02/Goblet-Squat.gif', video:'https://www.youtube.com/results?search_query=goblet+squat' }
    ];

    function uid(){ return 'id-' + Math.random().toString(36).slice(2,10); }
    function makeSet(ex, i){ return { id: uid(), index: i+1, reps: ex.reps, kg: ex.kg, done: false }; }
    function cloneExercise(id){
      const ex = LIBRARY.find(x => x.id === id);
      return {
        instanceId: uid(),
        libraryId: ex.id,
        name: ex.name,
        muscle: ex.muscle,
        equipment: ex.equipment,
        image: ex.image,
        video: ex.video,
        restSeconds: 90,
        done: false,
        sets: [makeSet(ex,0), makeSet(ex,1), makeSet(ex,2)]
      };
    }

    function createDefaultDays(){
      const wedId = uid();
      return {
        days: [
          { id: uid(), name: 'שני', label: 'חזה + יד קדמית', exercises: [cloneExercise('ex1'), cloneExercise('ex2'), cloneExercise('ex3'), cloneExercise('ex4'), cloneExercise('ex5'), cloneExercise('ex1')] },
          { id: wedId, name: 'רביעי', label: 'גב + יד אחורית', exercises: [cloneExercise('ex6'), cloneExercise('ex7'), cloneExercise('ex8'), cloneExercise('ex9'), cloneExercise('ex10'), cloneExercise('ex11'), cloneExercise('ex12')] },
          { id: uid(), name: 'שישי', label: 'כתפיים + רגליים', exercises: [cloneExercise('ex13'), cloneExercise('ex14'), cloneExercise('ex15'), cloneExercise('ex16'), cloneExercise('ex17'), cloneExercise('ex18')] },
          { id: uid(), name: 'שבת', label: 'אימון משולב', exercises: [cloneExercise('ex1'), cloneExercise('ex6'), cloneExercise('ex13'), cloneExercise('ex16'), cloneExercise('ex4'), cloneExercise('ex10')] }
        ],
        selectedDayId: wedId
      };
    }

    function defaultState(){
      const d = createDefaultDays();
      return {
        days: d.days,
        selectedDayId: d.selectedDayId,
        activeExerciseIndex: 0,
        history: [],
        spotifyUrl: 'https://open.spotify.com/playlist/37i9dQZF1DX76Wlfdnj7AP',
        filters: { search:'', muscle:'הכל', equipment:'הכל' },
        timers: { workoutSeconds: 0, workoutRunning: false, restSecondsLeft: 0, restRunning: false }
      };
    }

    function ensureFourFixedDays(stateObj){
      const defaults = createDefaultDays();
      const required = [
        ['שני','חזה + יד קדמית'],
        ['רביעי','גב + יד אחורית'],
        ['שישי','כתפיים + רגליים'],
        ['שבת','אימון משולב']
      ];
      required.forEach((pair, idx) => {
        const [name,label] = pair;
        const existing = stateObj.days.find(d => d.name === name);
        if (existing) {
          existing.label = label;
        } else {
          stateObj.days.push(defaults.days[idx]);
        }
      });
      stateObj.days = stateObj.days.filter(d => required.some(([n]) => d.name === n));
      if (!stateObj.days.find(d => d.id === stateObj.selectedDayId)) {
        stateObj.selectedDayId = stateObj.days.find(d => d.name === 'רביעי')?.id || stateObj.days[0]?.id;
      }
      return stateObj;
    }

    function load(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        let result = parsed || defaultState();
        result = ensureFourFixedDays(result);
        if (!result.timers) result.timers = { workoutSeconds: 0, workoutRunning: false, restSecondsLeft: 0, restRunning: false };
        result.days?.forEach(day => day.exercises?.forEach(ex => {
          const base = LIBRARY.find(item => item.id === ex.libraryId);
          if (base) {
            ex.name = base.name;
            ex.muscle = base.muscle;
            ex.equipment = base.equipment;
            ex.image = base.image;
            ex.video = base.video;
          }
          if (!Array.isArray(ex.sets) || !ex.sets.length) {
            const reps = ex.reps || base?.reps || '8';
            const kg = ex.kg || base?.kg || '20';
            ex.sets = [1,2,3].map((_,i)=>({ id: uid(), index:i+1, reps, kg, done:false }));
          }
          if (typeof ex.restSeconds !== 'number') ex.restSeconds = 90;
        }));
        if (typeof result.activeExerciseIndex !== 'number') result.activeExerciseIndex = 0;
        return result;
      } catch {
        return defaultState();
      }
    } catch {
        return defaultState();
      }
    }

    let state = load();
    function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function selectedDay(){ return state.days.find(d => d.id === state.selectedDayId) || state.days[0]; }
    function activeExercise(){ return selectedDay().exercises[state.activeExerciseIndex] || selectedDay().exercises[0]; }
    function formatTime(s){ const m=String(Math.floor((s||0)/60)).padStart(2,'0'); const ss=String((s||0)%60).padStart(2,'0'); return `${m}:${ss}`; }

    function render(){
      renderDays();
      renderExerciseProgress();
      renderActiveExercise();
      renderStats();
      renderHistory();
      renderMusic();
      renderLibrary();
      renderTimers();
      save();
    }

    function renderDays(){
      const day = selectedDay();
      document.getElementById('dayTabs').innerHTML = state.days.map(d => `<button class="day-card ${d.id===state.selectedDayId?'active':''}" onclick="selectDay('${d.id}')">${d.name}<small>${d.label}</small></button>`).join('');
      if (state.activeExerciseIndex >= day.exercises.length) state.activeExerciseIndex = Math.max(0, day.exercises.length - 1);
    }

    function renderExerciseProgress(){
      const day = selectedDay();
      const items = day.exercises.slice(0,6);
      document.getElementById('exerciseProgress').innerHTML = items.map((_,i)=>`<div class="progress-step ${i===state.activeExerciseIndex?'active':''}" onclick="setActiveExercise(${i})">${i+1}</div>`).join('');
    }

    function renderActiveExercise(){
      const ex = activeExercise();
      if (!ex) {
        document.getElementById('activeExerciseName').textContent = 'אין תרגילים';
        document.getElementById('activeExerciseDesc').textContent = 'הוסף תרגיל מהמאגר';
        document.getElementById('setsList').innerHTML = '<div class="empty">אין תרגילים ביום הנבחר</div>';
        document.getElementById('youtubeLink').href = '#';
        document.getElementById('animationLink').href = '#';
        return;
      }
      document.getElementById('activeExerciseImage').src = ex.image;
      document.getElementById('activeExerciseName').textContent = ex.name;
      document.getElementById('activeExerciseDesc').textContent = `${ex.muscle} • מנוחה עולה • 3 סטים`;
      document.getElementById('youtubeLink').href = ex.video;
      document.getElementById('animationLink').href = `https://www.youtube.com/results?search_query=${encodeURIComponent(ex.name + ' exercise animation')}`;
      document.getElementById('setsList').innerHTML = ex.sets.map((set, idx)=>`
        <div class="set-row ${!set.done && idx===ex.sets.findIndex(s=>!s.done)?'active':''}">
          <div class="set-index">${set.index}</div>
          <div class="input-wrap">
            <input class="tiny-input" value="${escapeHtml(set.reps)}" onchange="updateSetField('${ex.instanceId}','${set.id}','reps',this.value)" />
            <span class="unit">Reps</span>
          </div>
          <div class="input-wrap">
            <input class="tiny-input" value="${escapeHtml(set.kg)}" onchange="updateSetField('${ex.instanceId}','${set.id}','kg',this.value)" />
            <span class="unit">Kg</span>
          </div>
          <button class="icon-btn ${set.done?'done':''}" onclick="toggleSetDone('${ex.instanceId}','${set.id}')">${set.done?'✓':'○'}</button>
        </div>
      `).join('');
    }

    function renderTimers(){
      document.getElementById('workoutTimerDisplay').textContent = formatTime(state.timers.workoutSeconds);
      document.getElementById('restTimerDisplay').textContent = formatTime(state.timers.restSecondsLeft);
      document.getElementById('toggleWorkoutBtn').textContent = state.timers.workoutRunning ? 'עצור אימון' : 'התחל אימון';
      document.getElementById('toggleRestBtn').textContent = state.timers.restRunning ? 'עצור מנוחה' : 'התחל מנוחה';
    }

    function renderStats(){
      document.getElementById('totalWorkouts').textContent = state.history.length;
      document.getElementById('totalExercises').textContent = state.history.reduce((s,h)=>s+h.completedExercises,0);
      document.getElementById('streak').textContent = [...new Set(state.history.map(h=>h.date))].length;
    }

    function renderHistory(){
      const el = document.getElementById('historyList');
      if (!state.history.length) { el.innerHTML = '<div class="empty">עדיין אין היסטוריה</div>'; return; }
      el.innerHTML = state.history.slice().reverse().map(h=>`<div class="history-item"><strong>${escapeHtml(h.day)}</strong><div style="margin-top:6px;color:var(--muted);font-size:12px;">${h.date} • ${h.completedExercises} תרגילים • זמן ${formatTime(h.duration)}</div></div>`).join('');
    }

    function renderMusic(){
      document.getElementById('spotifyInput').value = state.spotifyUrl || '';
      const embed = spotifyEmbedUrl(state.spotifyUrl);
      document.getElementById('spotifyBar').src = embed + '&theme=0';
    }

    function spotifyEmbedUrl(url){
      const fallback = 'https://open.spotify.com/embed/playlist/37i9dQZF1DX76Wlfdnj7AP?utm_source=generator';
      const m = url && url.match(/open\.spotify\.com\/(playlist|album|track)\/([A-Za-z0-9]+)/);
      return m ? `https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator` : fallback;
    }

    function renderLibrary(){
      const muscles = ['הכל', ...new Set(LIBRARY.map(x=>x.muscle))];
      const equipment = ['הכל', ...new Set(LIBRARY.map(x=>x.equipment))];
      document.getElementById('muscleFilter').innerHTML = muscles.map(x=>`<option value="${x}">${x}</option>`).join('');
      document.getElementById('equipmentFilter').innerHTML = equipment.map(x=>`<option value="${x}">${x}</option>`).join('');
      document.getElementById('muscleFilter').value = state.filters.muscle;
      document.getElementById('equipmentFilter').value = state.filters.equipment;
      let items = [...LIBRARY];
      const q = state.filters.search.trim().toLowerCase();
      if (q) items = items.filter(x => `${x.name} ${x.muscle} ${x.equipment}`.toLowerCase().includes(q));
      if (state.filters.muscle !== 'הכל') items = items.filter(x=>x.muscle===state.filters.muscle);
      if (state.filters.equipment !== 'הכל') items = items.filter(x=>x.equipment===state.filters.equipment);
      document.getElementById('libraryList').innerHTML = items.map(item=>`
        <div class="library-item">
          <img src="${item.image}" alt="${escapeHtml(item.name)}" />
          <div>
            <div style="font-weight:700;">${escapeHtml(item.name)}</div>
            <div style="font-size:12px;color:var(--muted);">${escapeHtml(item.muscle)} • ${escapeHtml(item.equipment)}</div>
          </div>
          <button class="primary" style="padding:10px 12px;" onclick="addExercise('${item.id}')">הוסף</button>
        </div>
      `).join('') || '<div class="empty">לא נמצאו תרגילים</div>';
    }

    function selectDay(id){ state.selectedDayId = id; state.activeExerciseIndex = 0; render(); }
    function setActiveExercise(i){ state.activeExerciseIndex = i; render(); }

    function updateSetField(exerciseId, setId, field, value){
      const ex = selectedDay().exercises.find(e=>e.instanceId===exerciseId);
      const set = ex?.sets.find(s=>s.id===setId);
      if (!set) return;
      set[field] = value;
      save();
    }

    function toggleSetDone(exerciseId, setId){
      const ex = selectedDay().exercises.find(e=>e.instanceId===exerciseId);
      const set = ex?.sets.find(s=>s.id===setId);
      if (!set) return;
      set.done = !set.done;
      ex.done = ex.sets.every(s=>s.done);
      if (set.done) {
        startRestTimer(true);
      }
      if (ex.done && state.activeExerciseIndex < selectedDay().exercises.length - 1) {
        state.activeExerciseIndex += 1;
      }
      render();
    }

    function addExercise(id){
      selectedDay().exercises.push(cloneExercise(id));
      closeSheet();
      render();
    }

    function toggleWorkoutTimer(){
      if (state.timers.workoutRunning) {
        clearInterval(workoutTimerInterval);
        workoutTimerInterval = null;
        state.timers.workoutRunning = false;
      } else {
        state.timers.workoutRunning = true;
        workoutTimerInterval = setInterval(()=>{
          state.timers.workoutSeconds += 1;
          renderTimers();
          save();
        }, 1000);
      }
      renderTimers();
      save();
    }

    function playRestFinishedAlert() {
      try {
        const utterance = new SpeechSynthesisUtterance('המנוחה הסתיימה');
        utterance.lang = 'he-IL';
        utterance.rate = 1;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      } catch {}
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.setValueAtTime(0.001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.45);
      } catch {}
    }

    function startRestTimer(forceRestart=false){
      if (forceRestart && restTimerInterval) {
        clearInterval(restTimerInterval);
        restTimerInterval = null;
      }
      if (state.timers.restRunning && !forceRestart) return;
      if (forceRestart) state.timers.restSecondsLeft = 0;
      state.timers.restRunning = true;
      restTimerInterval = setInterval(()=>{
        state.timers.restSecondsLeft += 1;
        renderTimers();
        save();
      }, 1000);
      renderTimers();
      save();
    }

    function toggleRestTimer(forceStop=false){
      if (state.timers.restRunning || forceStop) {
        clearInterval(restTimerInterval);
        restTimerInterval = null;
        state.timers.restRunning = false;
      } else {
        startRestTimer(false);
        return;
      }
      renderTimers();
      save();
    }

    function finishWorkout(){
      const day = selectedDay();
      const completedExercises = day.exercises.filter(ex=>ex.done).length;
      state.history.push({
        id: uid(),
        day: `${day.name} - ${day.label}`,
        date: new Date().toLocaleDateString('he-IL'),
        completedExercises,
        duration: state.timers.workoutSeconds
      });
      day.exercises.forEach(ex => { ex.done = false; ex.sets.forEach(s=>s.done=false); });
      state.activeExerciseIndex = 0;
      state.timers.workoutSeconds = 0;
      state.timers.restSecondsLeft = 0;
      clearInterval(workoutTimerInterval); workoutTimerInterval = null; state.timers.workoutRunning = false;
      clearInterval(restTimerInterval); restTimerInterval = null; state.timers.restRunning = false;
      render();
      alert('האימון נשמר');
    }

    function saveSpotify(){
      const value = document.getElementById('spotifyInput').value.trim();
      if (!value.includes('spotify.com')) return alert('הדבק קישור Spotify תקין');
      state.spotifyUrl = value;
      render();
    }

    function openSheet(){ document.getElementById('sheetBackdrop').classList.add('open'); document.getElementById('librarySheet').classList.add('open'); }
    function closeSheet(){ document.getElementById('sheetBackdrop').classList.remove('open'); document.getElementById('librarySheet').classList.remove('open'); }
    function showSection(name){
      document.getElementById('statsSection').classList.toggle('hidden', name !== 'workout');
      document.getElementById('historySection').classList.toggle('hidden', name !== 'history');
      document.getElementById('musicSection').classList.toggle('hidden', name !== 'music');
    }

    function escapeHtml(str){
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    document.getElementById('openLibraryBtn').addEventListener('click', openSheet);
    document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);
    document.getElementById('toggleWorkoutBtn').addEventListener('click', toggleWorkoutTimer);
    document.getElementById('toggleRestBtn').addEventListener('click', ()=>toggleRestTimer(false));
    document.getElementById('finishWorkoutTopBtn').addEventListener('click', finishWorkout);
    document.getElementById('saveSpotifyBtn').addEventListener('click', saveSpotify);
    document.getElementById('navWorkout').addEventListener('click', ()=>showSection('workout'));
    document.getElementById('navHistory').addEventListener('click', ()=>showSection('history'));
    document.getElementById('navMusic').addEventListener('click', ()=>showSection('music'));
    document.getElementById('searchInput').addEventListener('input', e=>{ state.filters.search = e.target.value; renderLibrary(); save(); });
    document.getElementById('muscleFilter').addEventListener('change', e=>{ state.filters.muscle = e.target.value; renderLibrary(); save(); });
    document.getElementById('equipmentFilter').addEventListener('change', e=>{ state.filters.equipment = e.target.value; renderLibrary(); save(); });

    window.selectDay = selectDay;
    window.setActiveExercise = setActiveExercise;
    window.updateSetField = updateSetField;
    window.toggleSetDone = toggleSetDone;
    window.addExercise = addExercise;

    showSection('workout');
    render();
    if (state.timers.workoutRunning) toggleWorkoutTimer();
    if (state.timers.restRunning) startRestTimer();
  </script>
</body>
</html>
