<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <title>Fitness App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      margin: 10px;
      padding: 20px;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      background: #334155;
    }

    .hidden {
      display: none;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    ul {
      text-align: right;
      max-width: 300px;
      margin: auto;
    }
  </style>
</head>

<body>

<h1>💪 Fitness App עובד!</h1>

<div class="container" id="home">
  <h2>בחר אימון</h2>

  <div class="card" onclick="showWorkout('chest')">חזה + יד קדמית</div>
  <div class="card" onclick="showWorkout('back')">גב + יד אחורית</div>
  <div class="card" onclick="showWorkout('legs')">רגליים</div>
  <div class="card" onclick="showWorkout('shoulders')">כתפיים</div>
</div>

<div class="container hidden" id="workout">
  <h2 id="title"></h2>
  <ul id="list"></ul>
  <button onclick="goBack()">חזור</button>
</div>

<script>
  const workouts = {
    chest: ["לחיצת חזה", "פרפר", "שכיבות סמיכה", "כבל קרוס"],
    back: ["משיכה עליונה", "חתירה", "דדליפט", "פולי"],
    legs: ["סקוואט", "לחיצת רגליים", "לאנג׳ים", "תאומים"],
    shoulders: ["לחיצת כתפיים", "הרחקות צד", "הרחקות קדימה", "פייס פול"]
  };

  function showWorkout(type) {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("workout").classList.remove("hidden");

    const list = document.getElementById("list");
    const title = document.getElementById("title");

    list.innerHTML = "";
    title.innerText = type;

    workouts[type].forEach(ex => {
      const li = document.createElement("li");
      li.innerText = ex;
      list.appendChild(li);
    });
  }

  function goBack() {
    document.getElementById("home").classList.remove("hidden");
    document.getElementById("workout").classList.add("hidden");
  }
</script>

</body>
</html>
