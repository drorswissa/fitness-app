<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Fitness App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  padding: 16px;
  padding-bottom: 120px;
}

.header {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 20px;
}

.card {
  background: #111827;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 16px;
}

.exercise-top {
  display: flex;
  gap: 12px;
}

.exercise-top img {
  width: 70px;
  height: 70px;
  border-radius: 10px;
}

.exercise-name {
  font-size: 18px;
  font-weight: bold;
}

.exercise-muscle {
  font-size: 12px;
  color: #9ca3af;
}

.set-row {
  display: grid;
  grid-template-columns: 10px 1fr 1fr 1fr;
  gap: 8px;
  margin-top: 8px;
  font-size: 14px;
}

.dot {
  width: 6px;
  height: 6px;
  background: #22c55e;
  border-radius: 50%;
  margin-top: 6px;
}

.exercise-bottom-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.tiny-btn {
  border: none;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 11px;
  cursor: pointer;
  background: #1f2937;
  color: white;
}

.rest-btn {
  background: #334155;
}

.youtube {
  margin-top: 6px;
  font-size: 12px;
  color: #22c55e;
}

.timer-box {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: #22c55e;
  padding: 10px 20px;
  border-radius: 12px;
  font-size: 18px;
  display: none;
}

/* Spotify */
.spotify {
  position: fixed;
  bottom: 0;
  width: 100%;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">💪 תוכנית אימונים</div>
  <div id="workout"></div>
</div>

<div id="timer" class="timer-box">00:00</div>

<!-- Spotify -->
<div class="spotify">
<iframe style="border-radius:12px" 
src="https://open.spotify.com/embed/playlist/37i9dQZF1DX70RN3TfWWJh?autoplay=1" 
width="100%" height="80" frameBorder="0" allow="autoplay"></iframe>
</div>

<script>
const exercises = [
  {
    name: "Dumbbell Bench Press",
    muscle: "חזה",
    image: "https://i.imgur.com/8Km9tLL.png",
    video: "https://www.youtube.com/watch?v=VmB1G1K7v94"
  },
  {
    name: "Biceps Curl",
    muscle: "יד קדמית",
    image: "https://i.imgur.com/2SHX5XU.png",
    video: "https://www.youtube.com/watch?v=ykJmrZ5v0Oo"
  },
  {
    name: "Hammer Curl",
    muscle: "יד קדמית",
    image: "https://i.imgur.com/2SHX5XU.png",
    video: "https://www.youtube.com/watch?v=zC3nLlEvin4"
  }
];

const workoutDiv = document.getElementById("workout");

function renderWorkout() {
  workoutDiv.innerHTML = "";

  exercises.forEach(ex => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="exercise-top">
        <img src="${ex.image}">
        <div>
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-muscle">${ex.muscle}</div>
          <a class="youtube" href="${ex.video}" target="_blank">▶ סרטון</a>
        </div>
      </div>

      <div class="set-row"><div class="dot"></div><div>סט 1</div><div>8 חזרות</div><div>20 ק"ג</div></div>
      <div class="set-row"><div class="dot"></div><div>סט 2</div><div>8 חזרות</div><div>22.5 ק"ג</div></div>
      <div class="set-row"><div class="dot"></div><div>סט 3</div><div>8 חזרות</div><div>25 ק"ג</div></div>

      <div class="exercise-bottom-actions">
        <button class="tiny-btn" onclick="startTimer(30)">עבודה 30</button>
        <button class="tiny-btn" onclick="startTimer(45)">עבודה 45</button>
        <button class="tiny-btn" onclick="startTimer(60)">עבודה 60</button>

        <button class="tiny-btn rest-btn" onclick="startRest(60)">מנוחה 60</button>
        <button class="tiny-btn rest-btn" onclick="startRest(90)">מנוחה 90</button>
        <button class="tiny-btn rest-btn" onclick="startRest(120)">מנוחה 120</button>
      </div>
    `;

    workoutDiv.appendChild(card);
  });
}

let timerInterval;

function startTimer(seconds) {
  runTimer(seconds, false);
}

function startRest(seconds) {
  runTimer(seconds, true);
}

function runTimer(seconds, isRest) {
  const timerBox = document.getElementById("timer");
  timerBox.style.display = "block";

  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    const m = String(Math.floor(seconds / 60)).padStart(2,'0');
    const s = String(seconds % 60).padStart(2,'0');
    timerBox.innerText = m + ":" + s;

    if (seconds <= 0) {
      clearInterval(timerInterval);
      timerBox.style.display = "none";

      if (isRest) {
        speak("יאללה חזרה לעבודה");
      }

    }

    seconds--;
  }, 1000);
}

// קול בעברית
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "he-IL";
  speechSynthesis.speak(msg);
}

renderWorkout();
</script>

</body>
</html>
