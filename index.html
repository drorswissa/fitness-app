<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout App Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}
.container{max-width:480px;margin:auto;padding:15px}
.card{
  background:#1e293b;
  padding:15px;
  border-radius:20px;
  margin-bottom:15px;
}
button{
  border:none;
  padding:10px;
  border-radius:10px;
  margin:3px;
  cursor:pointer;
}
.primary{background:#22c55e;color:#000}
.secondary{background:#334155;color:#fff}
.danger{background:#ef4444;color:#fff}
input{
  width:60px;
  padding:5px;
  border-radius:5px;
  border:none;
  text-align:center;
}
img{width:100%;border-radius:15px}
.timer{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  padding:15px;
  border-radius:20px;
  font-size:24px;
}
.spotify{
  position:fixed;
  bottom:0;
  width:100%;
}
</style>
</head>

<body>

<div class="container">

<h2>Workout App</h2>

<div id="home">
  <div class="card" onclick="loadWorkout('chest')">חזה + יד קדמית</div>
  <div class="card" onclick="loadWorkout('back')">גב + יד אחורית</div>
  <div class="card" onclick="loadWorkout('shoulders')">כתפיים + רגליים</div>
  <div class="card" onclick="loadWorkout('full')">אימון משולב</div>
  <div class="card" onclick="showHistory()">📊 היסטוריה</div>
</div>

<div id="workout" style="display:none"></div>

<div id="history" style="display:none"></div>

</div>

<div class="timer" id="timer">00:00</div>

<div class="spotify">
<iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DX76Wlfdnj7AP"
width="100%" height="80"></iframe>
</div>

<script>

let workouts = {
chest:[
"Machine Chest Press",
"Incline Dumbbell Press",
"Pec Deck",
"Cable Fly",
"Hammer Curl",
"Cable Curl"
],
back:[
"Lat Pulldown",
"Seated Row",
"Chest Supported Row",
"Pushdown",
"Overhead Extension",
"Single Arm Pushdown"
],
shoulders:[
"Shoulder Press",
"Lateral Raise",
"Rear Delt",
"Squat",
"Goblet Squat",
"Bulgarian Split"
],
full:[
"Smith Bench",
"Lat Pulldown",
"Shoulder Press",
"Curl",
"Pushdown",
"Leg Press"
]
};

let timerInt;

function startTimer(){
let sec=0;
clearInterval(timerInt);
timerInt=setInterval(()=>{
sec++;
let m=Math.floor(sec/60);
let s=sec%60;
timer.innerText=`${m}:${s}`;
},1000);
}

function stopTimer(){
clearInterval(timerInt);
timer.innerText="00:00";
speechSynthesis.speak(new SpeechSynthesisUtterance("קדימה לעבודה"));
}

function loadWorkout(type){
home.style.display="none";
workout.style.display="block";

workout.innerHTML="<button onclick='goHome()'>⬅</button>";

workouts[type].forEach((ex,i)=>{
workout.innerHTML+=`
<div class="card">
<h3>${ex}</h3>
<img src="https://img.youtube.com/vi/2-LAMcpzODU/hqdefault.jpg">
<br>
<a target="_blank" href="https://youtube.com/results?search_query=${ex}">וידאו</a>
<br><br>

<button class="primary" onclick="startTimer()">▶ סט</button>
<button class="secondary" onclick="startTimer()">⏱ מנוחה</button>
<button class="danger" onclick="stopTimer()">⛔ עצור</button>

<br><br>

סט1: <input> <input>
סט2: <input> <input>
סט3: <input> <input>

</div>
`;
});
}

function goHome(){
workout.style.display="none";
history.style.display="none";
home.style.display="block";
}

function saveWorkout(){
let data={date:new Date().toLocaleString()};
let arr=JSON.parse(localStorage.getItem("history")||"[]");
arr.push(data);
localStorage.setItem("history",JSON.stringify(arr));
}

function showHistory(){
home.style.display="none";
history.style.display="block";

let arr=JSON.parse(localStorage.getItem("history")||"[]");
history.innerHTML="<button onclick='goHome()'>⬅</button><h3>היסטוריה</h3>";

arr.forEach(x=>{
history.innerHTML+=`<div class="card">${x.date}</div>`;
});
}

</script>

</body>
</html>
