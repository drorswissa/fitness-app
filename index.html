<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout V3</title>

<style>
body {
  background:#0b0f14;
  color:white;
  font-family:Arial;
  padding:20px;
}
select, button {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}
.card {
  background:#121821;
  padding:10px;
  border-radius:12px;
  margin:10px 0;
}
img {
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>בחר תרגיל</h2>

<select id="muscle">
  <option value="">בחר שריר</option>
  <option value="1">Chest</option>
  <option value="2">Back</option>
  <option value="3">Shoulders</option>
  <option value="4">Biceps</option>
  <option value="5">Triceps</option>
  <option value="10">Legs</option>
</select>

<select id="equipment">
  <option value="">בחר ציוד</option>
  <option value="1">Barbell</option>
  <option value="3">Dumbbells</option>
  <option value="7">Machine</option>
</select>

<button onclick="loadExercises()">🔍 חפש תרגילים</button>

<div id="results"></div>

<script>

async function loadExercises() {
  const muscle = document.getElementById("muscle").value;
  const equipment = document.getElementById("equipment").value;

  let url = "https://wger.de/api/v2/exercise/?language=2";

  if (muscle) url += "&muscles=" + muscle;
  if (equipment) url += "&equipment=" + equipment;

  const res = await fetch(url);
  const data = await res.json();

  showExercises(data.results);
}

function showExercises(exercises) {
  const box = document.getElementById("results");
  box.innerHTML = "";

  exercises.slice(0,10).forEach(ex => {

    const videoSearch = encodeURIComponent(ex.name + " exercise");
    const videoUrl = "https://www.youtube.com/results?search_query=" + videoSearch;
    const thumbnail = "https://img.youtube.com/vi/qEwKCR5JCog/hqdefault.jpg";

    box.innerHTML += `
      <div class="card">
        <h3>${ex.name}</h3>
        <img src="${thumbnail}">
        <a href="${videoUrl}" target="_blank">🎥 סרטון</a>
        <button onclick="addExercise('${ex.name}')">➕ הוסף לאימון</button>
      </div>
    `;
  });
}

function addExercise(name){
  alert("נוסף לאימון: " + name);
}

</script>

</body>
</html>
