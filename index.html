<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout V3 Pro</title>

<style>
:root{
--bg:#05070c;
--panel:#0b111a;
--text:#f6f8fb;
--muted:#8c9bad;
--accent:#00f5a0;
--accent2:#00c2ff;
--line:rgba(255,255,255,0.08);
}

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#05070c,#020408);
color:var(--text);
}

.app{max-width:430px;margin:auto;padding:12px}

/* ===== DASHBOARD ===== */
.dashboard{
background:var(--panel);
border-radius:22px;
padding:16px;
margin-bottom:12px;
border:1px solid var(--line);
text-align:center;
}

.ring{
width:140px;
height:140px;
border-radius:50%;
margin:auto;
background:conic-gradient(var(--accent) 65%, rgba(255,255,255,0.08) 0);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:900;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-top:12px;
}

.stat{
background:#0f1722;
border-radius:12px;
padding:10px;
font-size:12px;
}

.stat strong{
display:block;
font-size:18px;
margin-top:4px;
color:var(--accent);
}

/* ===== CARD ===== */
.card{
background:var(--panel);
border-radius:22px;
padding:14px;
border:1px solid var(--line);
margin-bottom:12px;
}

.timer{
font-size:26px;
text-align:center;
color:var(--accent);
font-weight:900;
}

/* ===== EXERCISE ===== */
.exercise img{
width:100%;
height:150px;
object-fit:contain;
background:white;
border-radius:14px;
}

/* ===== SETS ===== */
.set{
display:flex;
justify-content:space-between;
background:#0f1722;
padding:10px;
border-radius:12px;
margin-top:6px;
}

.set.active{
border:1px solid var(--accent);
}

/* ===== BUTTON ===== */
.btn{
padding:12px;
border-radius:14px;
border:none;
background:linear-gradient(135deg,var(--accent),var(--accent2));
font-weight:900;
width:100%;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid var(--line);
background:#0f1722;
color:white;
}
</style>
</head>

<body>

<div class="app">

<!-- DASHBOARD -->
<div class="dashboard">
<div class="ring" id="ring">0</div>

<div class="stats">
<div class="stat">זמן<strong id="timeStat">0</strong></div>
<div class="stat">סטים<strong id="setsStat">0</strong></div>
<div class="stat">תרגילים<strong id="exStat">0</strong></div>
<div class="stat">קלוריות<strong id="calStat">0</strong></div>
</div>
</div>

<!-- WORKOUT -->
<div class="card">

<div class="timer" id="timer">00:00</div>

<div class="exercise">
<img src="https://fitnessprogramer.com/wp-content/uploads/2021/02/Machine-Shoulder-Press.gif">
<h3>Shoulder Press</h3>
</div>

<div class="set active">Kg 20 | Reps 10</div>
<div class="set">Kg 20 | Reps 10</div>
<div class="set">Kg 20 | Reps 10</div>

<button class="btn" onclick="startWorkout()">התחל אימון</button>

</div>

<!-- WALK -->
<div class="card">
<h3>הליכה</h3>

<input id="timeWalk" placeholder="דקות">
<input id="incline" placeholder="שיפוע">

<button class="btn" onclick="saveWalk()">שמור</button>
</div>

</div>

<script>
let t=0
let int

function startWorkout(){
int=setInterval(()=>{
t++
document.getElementById('timer').innerText=format(t)

let cal=Math.round(t*0.2)
document.getElementById('calStat').innerText=cal
document.getElementById('ring').innerText=cal

},1000)
}

function format(s){
let m=Math.floor(s/60)
let sec=s%60
return (m<10?'0':'')+m+":"+(sec<10?'0':'')+sec
}

function saveWalk(){
let time=document.getElementById('timeWalk').value
let incline=document.getElementById('incline').value

let cal=Math.round(time*4 + incline*2)

alert("נשמר "+cal+" קלוריות")
}
</script>

</body>
</html>
