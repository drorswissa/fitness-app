<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout App</title>
  <style>
    :root {
      --bg: #0d1324;
      --card: #151d35;
      --card-2: #1c2747;
      --text: #f5f7ff;
      --muted: #aeb7d4;
      --line: rgba(255,255,255,0.08);
      --accent: #8dff7a;
      --danger: #ff7c7c;
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0a1020, #0d1324);
      color: var(--text);
    }
    .app {
      max-width: 520px;
      margin: 0 auto;
      padding: 14px 12px 40px;
    }
    .screen {
      display: grid;
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
    }
    .title {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin: 6px 0 2px;
    }
    .sub {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    .day-tabs, .row, .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .day-tab, button, select, input {
      font: inherit;
    }
    .day-tab, button {
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
    }
    .day-tab {
      background: var(--card-2);
      color: var(--text);
      flex: 1 1 calc(50% - 8px);
    }
    .day-tab.active {
      outline: 2px solid rgba(141,255,122,0.5);
      background: rgba(141,255,122,0.14);
    }
    .primary {
      background: var(--accent);
      color: #10220a;
      font-weight: 700;
      width: 100%;
    }
    .secondary {
      background: var(--card-2);
      color: var(--text);
      border: 1px solid var(--line);
    }
    .danger {
      background: rgba(255,124,124,0.15);
      color: #ffd9d9;
      border: 1px solid rgba(255,124,124,0.22);
    }
    .exercise {
      background: var(--card-2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .exercise-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .exercise-name {
      font-size: 17px;
      font-weight: 700;
    }
    .muted { color: var(--muted); font-size: 13px; }
    .tag {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .stat {
      text-align: center;
      background: var(--card-2);
      border-radius: 16px;
      padding: 12px;
      border: 1px solid var(--line);
    }
    .stat strong {
      display: block;
      font-size: 22px;
      margin-top: 4px;
    }
    .history-item {
      background: var(--card-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .hidden { display: none; }
    .bottom-bar {
      position: sticky;
      bottom: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      background: rgba(10,16,32,0.9);
      padding-top: 8px;
    }
    .sheet {
      position: fixed;
      inset: auto 0 0 0;
      background: var(--card);
      border-top: 1px solid var(--line);
      border-radius: 20px 20px 0 0;
      padding: 14px;
      max-height: 78vh;
      overflow: auto;
      display: none;
      z-index: 10;
    }
    .sheet.open { display: block; }
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      z-index: 9;
    }
    .sheet-backdrop.open { display: block; }
    input, select {
      width: 100%;
      background: var(--card-2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="screen">
      <div class="card">
        <div class="title">האימונים שלי</div>
        <div class="sub">פשוט, נקי, ונראה כמו אפליקציה</div>
      </div>

      <div class="card">
        <div class="day-tabs" id="dayTabs"></div>
      </div>

      <div class="card">
        <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:10px;">
          <div>
            <div id="workoutTitle" style="font-size:22px;font-weight:700;"></div>
            <div id="workoutNote" class="muted"></div>
          </div>
          <button class="secondary" id="openLibraryBtn">+ תרגיל</button>
        </div>
        <div class="buttons" style="margin-bottom:10px;">
          <button class="primary" id="finishWorkoutBtn">סיימתי אימון</button>
        </div>
        <div id="exerciseList"></div>
      </div>

      <div class="card" id="statsCard">
        <div class="mini-grid">
          <div class="stat">אימונים<strong id="totalWorkouts">0</strong></div>
          <div class="stat">תרגילים<strong id="totalExercises">0</strong></div>
          <div class="stat">רצף<strong id="streak">0</strong></div>
        </div>
      </div>

      <div class="card hidden" id="historyCard">
        <div style="font-size:18px;font-weight:700;margin-bottom:10px;">היסטוריה</div>
        <div id="historyList"></div>
      </div>

      <div class="card hidden" id="musicCard">
        <div style="font-size:18px;font-weight:700;margin-bottom:10px;">מוזיקה</div>
        <iframe id="spotifyEmbed" style="border-radius:14px;width:100%;height:152px;border:none;" src="https://open.spotify.com/embed/playlist/37i9dQZF1DX76Wlfdnj7AP?utm_source=generator" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        <input id="spotifyInput" placeholder="הדבק קישור Spotify" />
        <button class="secondary" id="saveSpotifyBtn">שמור פלייליסט</button>
      </div>

      <div class="bottom-bar">
        <button class="secondary" id="navWorkout">אימון</button>
        <button class="secondary" id="navHistory">היסטוריה</button>
        <button class="secondary" id="navMusic">מוזיקה</button>
      </div>
    </div>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="librarySheet">
    <div style="font-size:20px;font-weight:700;margin-bottom:10px;">הוספת תרגיל</div>
    <input id="searchInput" placeholder="חפש תרגיל" />
    <select id="muscleFilter"></select>
    <select id="equipmentFilter"></select>
    <div id="libraryList"></div>
  </div>

  <script>
    const STORAGE_KEY = 'simple_workout_app_v1';

    const LIBRARY = [
      { id:'ex1', name:'דחיקת חזה בסמית', muscle:'חזה', equipment:'סמית', sets:3, reps:'8-10', video:'https://www.youtube.com/results?search_query=smith+machine+bench+press' },
      { id:'ex2', name:'פרפר חזה', muscle:'חזה', equipment:'מכונה', sets:3, reps:'10-15', video:'https://www.youtube.com/results?search_query=pec+deck+fly' },
      { id:'ex3', name:'פולי עליון רחב', muscle:'גב', equipment:'מכונה', sets:3, reps:'8-12', video:'https://www.youtube.com/results?search_query=lat+pulldown' },
      { id:'ex4', name:'חתירה בישיבה', muscle:'גב', equipment:'כבלים', sets:3, reps:'8-12', video:'https://www.youtube.com/results?search_query=seated+cable+row' },
      { id:'ex5', name:'חתירה יד אחת עם דאמבל', muscle:'גב', equipment:'משקולות', sets:3, reps:'8-12', video:'https://www.youtube.com/results?search_query=one+arm+dumbbell+row' },
      { id:'ex6', name:'פשיטת מרפקים בחבל', muscle:'יד אחורית', equipment:'כבלים', sets:3, reps:'10-15', video:'https://www.youtube.com/results?search_query=rope+triceps+pushdown' },
      { id:'ex7', name:'פשיטת מרפקים מעל הראש', muscle:'יד אחורית', equipment:'כבלים', sets:3, reps:'10-12', video:'https://www.youtube.com/results?search_query=overhead+cable+triceps+extension' },
      { id:'ex8', name:'מקבילים בסיוע', muscle:'יד אחורית', equipment:'מכונה', sets:3, reps:'8-12', video:'https://www.youtube.com/results?search_query=assisted+dips' },
      { id:'ex9', name:'כפיפת מרפקים עם דאמבלים', muscle:'יד קדמית', equipment:'משקולות', sets:3, reps:'10-12', video:'https://www.youtube.com/results?search_query=dumbbell+biceps+curl' },
      { id:'ex10', name:'לחיצת כתפיים', muscle:'כתפיים', equipment:'מכונה', sets:3, reps:'8-12', video:'https://www.youtube.com/results?search_query=machine+shoulder+press' },
      { id:'ex11', name:'הרחקת כתפיים לצדדים', muscle:'כתפיים', equipment:'משקולות', sets:3, reps:'12-15', video:'https://www.youtube.com/results?search_query=lateral+raise' },
      { id:'ex12', name:'לחיצת רגליים', muscle:'רגליים', equipment:'מכונה', sets:4, reps:'10-15', video:'https://www.youtube.com/results?search_query=leg+press' },
      { id:'ex13', name:'כפיפת ברכיים', muscle:'רגליים', equipment:'מכונה', sets:3, reps:'12-15', video:'https://www.youtube.com/results?search_query=leg+curl' },
      { id:'ex14', name:'סקוואט גביע', muscle:'רגליים', equipment:'משקולות', sets:3, reps:'10-12', video:'https://www.youtube.com/results?search_query=goblet+squat' },
      { id:'ex15', name:'פלאנק', muscle:'בטן', equipment:'משקל גוף', sets:3, reps:'30-60 שניות', video:'https://www.youtube.com/results?search_query=plank+exercise' }
    ];

    function uid(){ return 'id-'+Math.random().toString(36).slice(2,9); }
    function cloneExercise(id){
      const ex = LIBRARY.find(x => x.id === id);
      return { instanceId: uid(), libraryId: ex.id, name: ex.name, muscle: ex.muscle, equipment: ex.equipment, sets: ex.sets, reps: ex.reps, video: ex.video, done: false };
    }

    function defaultState(){
      const wedId = uid();
      return {
        days: [
          { id: uid(), name: 'שני', label: 'חזה + יד קדמית', exercises: [cloneExercise('ex1'), cloneExercise('ex2'), cloneExercise('ex9')] },
          { id: wedId, name: 'רביעי', label: 'גב + יד אחורית', exercises: [cloneExercise('ex3'), cloneExercise('ex4'), cloneExercise('ex6'), cloneExercise('ex7')] },
          { id: uid(), name: 'שישי', label: 'כתפיים + רגליים', exercises: [cloneExercise('ex10'), cloneExercise('ex11'), cloneExercise('ex12'), cloneExercise('ex13')] },
          { id: uid(), name: 'שבת', label: 'אימון משולב', exercises: [cloneExercise('ex5'), cloneExercise('ex14'), cloneExercise('ex15')] }
        ],
        selectedDayId: wedId,
        history: [],
        spotifyUrl: 'https://open.spotify.com/playlist/37i9dQZF1DX76Wlfdnj7AP',
        filters: { search:'', muscle:'הכל', equipment:'הכל' }
      };
    }

    let state = load();
    function load(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : defaultState();
      } catch { return defaultState(); }
    }
    function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function selectedDay(){ return state.days.find(d => d.id === state.selectedDayId) || state.days[0]; }

    function render(){
      renderTabs();
      renderWorkout();
      renderStats();
      renderHistory();
      renderLibrary();
      renderMusic();
      save();
    }

    function renderTabs(){
      const el = document.getElementById('dayTabs');
      el.innerHTML = state.days.map(day => `<button class="day-tab ${day.id===state.selectedDayId?'active':''}" onclick="selectDay('${day.id}')">${day.name}<br><span class='muted'>${day.label}</span></button>`).join('');
    }

    function renderWorkout(){
      const day = selectedDay();
      document.getElementById('workoutTitle').textContent = `${day.name} - ${day.label}`;
      document.getElementById('workoutNote').textContent = `${day.exercises.length} תרגילים`;
      const list = document.getElementById('exerciseList');
      list.innerHTML = day.exercises.map(ex => `
        <div class="exercise">
          <div class="exercise-top">
            <div>
              <div class="exercise-name">${ex.name}</div>
              <div class="muted">${ex.muscle} • ${ex.equipment}</div>
            </div>
            <button class="secondary" onclick="toggleDone('${day.id}','${ex.instanceId}')">${ex.done ? 'בוצע ✓' : 'סמן'}</button>
          </div>
          <div class="row">
            <span class="tag">${ex.sets} סטים</span>
            <span class="tag">${ex.reps}</span>
          </div>
          <div class="row">
            <a class="secondary" style="text-decoration:none;padding:10px 12px;display:inline-block;" href="${ex.video}" target="_blank" rel="noopener">יוטיוב</a>
            <button class="danger" onclick="removeExercise('${day.id}','${ex.instanceId}')">מחק</button>
          </div>
        </div>
      `).join('');
    }

    function renderStats(){
      document.getElementById('totalWorkouts').textContent = state.history.length;
      document.getElementById('totalExercises').textContent = state.history.reduce((s,x)=>s+x.completed,0);
      document.getElementById('streak').textContent = calcStreak();
    }

    function renderHistory(){
      const el = document.getElementById('historyList');
      if(!state.history.length){ el.innerHTML = '<div class="muted">עדיין אין היסטוריה</div>'; return; }
      el.innerHTML = state.history.slice().reverse().map(item => `<div class="history-item"><strong>${item.day}</strong><div class="muted">${item.date} • ${item.completed}/${item.total} בוצעו</div></div>`).join('');
    }

    function renderMusic(){
      document.getElementById('spotifyInput').value = state.spotifyUrl || '';
      document.getElementById('spotifyEmbed').src = embedUrl(state.spotifyUrl);
    }

    function renderLibrary(){
      const muscles = ['הכל', ...new Set(LIBRARY.map(x=>x.muscle))];
      const equips = ['הכל', ...new Set(LIBRARY.map(x=>x.equipment))];
      document.getElementById('muscleFilter').innerHTML = muscles.map(x=>`<option>${x}</option>`).join('');
      document.getElementById('equipmentFilter').innerHTML = equips.map(x=>`<option>${x}</option>`).join('');
      document.getElementById('muscleFilter').value = state.filters.muscle;
      document.getElementById('equipmentFilter').value = state.filters.equipment;

      let items = [...LIBRARY];
      const q = state.filters.search.trim().toLowerCase();
      if(q) items = items.filter(x => `${x.name} ${x.muscle} ${x.equipment}`.toLowerCase().includes(q));
      if(state.filters.muscle !== 'הכל') items = items.filter(x => x.muscle === state.filters.muscle);
      if(state.filters.equipment !== 'הכל') items = items.filter(x => x.equipment === state.filters.equipment);

      document.getElementById('libraryList').innerHTML = items.map(item => `
        <div class="exercise" style="margin-bottom:8px;">
          <div class="exercise-name">${item.name}</div>
          <div class="muted">${item.muscle} • ${item.equipment}</div>
          <div class="row">
            <span class="tag">${item.sets} סטים</span>
            <span class="tag">${item.reps}</span>
          </div>
          <div class="row">
            <button class="primary" onclick="addExercise('${item.id}')">הוסף</button>
            <a class="secondary" style="text-decoration:none;padding:10px 12px;display:inline-block;" href="${item.video}" target="_blank" rel="noopener">יוטיוב</a>
          </div>
        </div>
      `).join('');
    }

    function selectDay(id){ state.selectedDayId = id; render(); }
    function toggleDone(dayId, instanceId){
      const ex = state.days.find(d=>d.id===dayId)?.exercises.find(e=>e.instanceId===instanceId);
      if(!ex) return;
      ex.done = !ex.done; render();
    }
    function removeExercise(dayId, instanceId){
      const day = state.days.find(d=>d.id===dayId); if(!day) return;
      day.exercises = day.exercises.filter(e=>e.instanceId!==instanceId); render();
    }
    function addExercise(id){ selectedDay().exercises.push(cloneExercise(id)); closeSheet(); render(); }
    function finishWorkout(){
      const day = selectedDay();
      state.history.push({
        day: `${day.name} - ${day.label}`,
        date: new Date().toLocaleDateString('he-IL'),
        completed: day.exercises.filter(x=>x.done).length,
        total: day.exercises.length
      });
      day.exercises.forEach(x=>x.done=false);
      render();
      alert('האימון נשמר');
    }
    function calcStreak(){
      if(!state.history.length) return 0;
      const unique = [...new Set(state.history.map(x=>x.date))];
      return unique.length;
    }
    function embedUrl(url){
      const fallback='https://open.spotify.com/embed/playlist/37i9dQZF1DX76Wlfdnj7AP?utm_source=generator';
      const m = url && url.match(/open\.spotify\.com\/(playlist|album|track)\/([A-Za-z0-9]+)/);
      return m ? `https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator` : fallback;
    }
    function saveSpotify(){
      const value = document.getElementById('spotifyInput').value.trim();
      if(!value.includes('spotify.com')) return alert('הדבק קישור Spotify תקין');
      state.spotifyUrl = value; render();
    }
    function openSheet(){ document.getElementById('librarySheet').classList.add('open'); document.getElementById('sheetBackdrop').classList.add('open'); }
    function closeSheet(){ document.getElementById('librarySheet').classList.remove('open'); document.getElementById('sheetBackdrop').classList.remove('open'); }
    function showSection(section){
      document.getElementById('statsCard').classList.toggle('hidden', section !== 'workout');
      document.getElementById('historyCard').classList.toggle('hidden', section !== 'history');
      document.getElementById('musicCard').classList.toggle('hidden', section !== 'music');
    }

    document.getElementById('openLibraryBtn').addEventListener('click', openSheet);
    document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);
    document.getElementById('finishWorkoutBtn').addEventListener('click', finishWorkout);
    document.getElementById('saveSpotifyBtn').addEventListener('click', saveSpotify);
    document.getElementById('navWorkout').addEventListener('click', ()=>showSection('workout'));
    document.getElementById('navHistory').addEventListener('click', ()=>showSection('history'));
    document.getElementById('navMusic').addEventListener('click', ()=>showSection('music'));
    document.getElementById('searchInput').addEventListener('input', e=>{ state.filters.search=e.target.value; renderLibrary(); save(); });
    document.getElementById('muscleFilter').addEventListener('change', e=>{ state.filters.muscle=e.target.value; renderLibrary(); save(); });
    document.getElementById('equipmentFilter').addEventListener('change', e=>{ state.filters.equipment=e.target.value; renderLibrary(); save(); });

    window.selectDay = selectDay;
    window.toggleDone = toggleDone;
    window.removeExercise = removeExercise;
    window.addExercise = addExercise;

    showSection('workout');
    render();
  </script>
</body>
</html>
